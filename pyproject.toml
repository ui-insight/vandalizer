[project]
name = "vandalizer"
version = "2.0.0"
description = "Vandalizer"
authors = [{ name = "John Brunsfeld", email = "jbrunsfeld@uidaho.edu" }]
readme = "README.md"
requires-python = "<4.0,>=3.9"
dependencies = [
    "flask",
    "flask-bootstrap",
    "flask-cors",
    "flask-dance",
    "flask-login",
    "flask-mail",
    "flask-socketio",
    "flask-wtf",
    "wtforms",
]



[project.optional-dependencies]
dev = ["tox", "pytest", "pytest-cov", "ruff"]

[tool.setuptools.packages.find]
exclude = ["certs", "tests", "vandalizer-dev"]

[build-system]
requires = ["setuptools", "cython"]
build-backend = "setuptools.build_meta"

[tool.tox]
envlist = ["selenium"]

[tool.tox.selenium]
deps = [
    "selenium-webdriver",
    "pytest"
]
commands =[
    "pytest"
]