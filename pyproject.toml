[project]
name = "vandalizer"
version = "2.0.0"
description = "Vandalizer"
authors = [{ name = "John Brunsfeld", email = "jbrunsfeld@uidaho.edu" }]
readme = "README.md"
requires-python = "<4.0,>=3.9"
dependencies = [
    "chardet",
    "chromadb",
    "datasets",
    "devtools",
    "dspy",
    "fitz",
    "flask",
    "flask-bootstrap",
    "flask-cors",
    "flask-dance",
    "flask-login",
    "flask-mail",
    "flask-wtf",
    "wtforms",
    "httpx",
    "itsdangerous",
    "langchain",
    "langchain_chroma",
    "langchain_community",
    "langchain_openai",
    "langchain_redis",
    "langchain_text_splitters",
    "langfuse",
    "markdownify",
    "mongoengine",
    "nest_asyncio",
    "nltk",
    "oauthlib",
    "openai",
    "openpyxl",
    "pandas",
    "pydantic",
    "pydantic-ai",
    "pymongo",
    "pymupdf",
    "pymupdf4llm",
    "pypandoc",
    "pypdf",
    "PyPDF2",
    "pysqlite3",
    "python-dotenv",
    "redis",
    "requests",
    "rollbar",
    "tiktoken",
    "wtforms",
    "celery>=5.5.1",
]


[project.optional-dependencies]
dev = ["tox", "pytest", "pytest-cov", "ruff", "selenium"]

[tool.setuptools.packages.find]
exclude = ["certs", "tests", "vandalizer-dev"]

[build-system]
requires = ["setuptools", "cython"]
build-backend = "setuptools.build_meta"

[tool.tox]
envlist = ["selenium_firefox", "selenium_chrome"]
no_package = true

[tool.tox.env.selenium_firefox.set_env]
BASE_URL = "https://vandalizer-dev.nkn.uidaho.edu"
TEST_BROWSER_HEADLESS = "true"
TEST_BROWSER = "firefox"

[tool.tox.env.selenium_firefox]
description = "Run Selenium tests"
skip_install = true
deps = ["selenium", "pytest"]
commands = [["pytest"]]

[tool.tox.env.selenium_chrome.set_env]
BASE_URL = "https://vandalizer-dev.nkn.uidaho.edu"
TEST_BROWSER_HEADLESS = "true"
TEST_BROWSER = "chrome"

[tool.tox.env.selenium_chrome]
description = "Run Selenium tests"
skip_install = true
deps = ["selenium", "pytest"]
commands = [["pytest"]]
