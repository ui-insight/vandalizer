services:
  redis:
    image: redis/redis-stack:7.4.0-v3
    ports:
      - "6379:6379"
    networks:
      - vandalizer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0.16
    ports:
      - "27018:27017"
    networks:
      - vandalizer
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  chromadb:
    image: chromadb/chroma:0.6.3
    ports:
      - "8000:8000"
    networks:
      - vandalizer
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      - REDIS_HOST=redis
      - MONGO_HOST=mongodb://mongo:27017/
      - CHROMADB_PERSIST_DIR=/app/static/db
      - UPLOAD_DIR=/app/static/uploads
    networks:
      - vandalizer
    volumes:
      - uploads:/app/static/uploads
      - chroma-data:/app/static/db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      - REDIS_HOST=redis
      - MONGO_HOST=mongodb://mongo:27017/
      - CHROMADB_PERSIST_DIR=/app/static/db
      - UPLOAD_DIR=/app/static/uploads
    networks:
      - vandalizer
    volumes:
      - uploads:/app/static/uploads
      - chroma-data:/app/static/db
    entrypoint: ["sh", "run_celery.sh", "start"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      - REDIS_HOST=redis
    ports:
      - "5555:5555"
    networks:
      - vandalizer
    entrypoint: ["celery", "-A", "app.celery_app:celery", "flower", "--port=5555", "--persistent=True", "--db=/tmp/flower.db"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - vandalizer
    restart: unless-stopped

networks:
  vandalizer:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  chroma-data:
    driver: local
  uploads:
    driver: local
