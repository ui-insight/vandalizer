<div class="tab-content" id="chat-panel">
    <div class="chat-card-container">
        <div class="loading-event-progress-container" style="display: none;">
            <div class="loading-event-progress-content">
                <div id="loading-event-progress">
                    <i id="loading-event-icon" class="fa-solid fa-file-import"></i>
                    <h2 id="loading-event-title">Ready to get started?</h2>
                    <p id="loading-event-message">Just add or select a document to begin.</p>
                    <p id="loading-event-title"></p>
                    <div class="loading-progress-bar">
                        <div class="loading-progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="recommendations-panel">
    </div>

    {% include "chat/chat_search_panel.html" %}
</div>

<style>
    .btn-icon-danger {
        background-color: #dc3545;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    .btn-icon-danger:hover {
        background-color: #c82333;
    }

    .btn-icon-danger:disabled {
        background-color: #6c757d;
        cursor: not-allowed;
        opacity: 0.6;
    }
</style>

<script>
    // Show/hide delete button based on selection
    $("#chat-history-select").on("change", function () {
        const conversationId = $(this).val();

        // Show delete button only if a conversation is selected (not "New Conversation")
        if (conversationId) {
            $("#delete-conversation-btn").show();
        } else {
            $("#delete-conversation-btn").hide();
        }

        if (!conversationId) {
            // Clear chat history if "New Conversation" is chosen
            $("#chat-panel .message-you, #chat-panel .message-response-body").parent().remove();
            return;
        }

        fetch(`/chat_history/${conversationId}`)
            .then(res => res.json())
            .then(data => {
                // Clear previous messages
                $("#chat-panel .message-you, #chat-panel .message-response-body").parent().remove();
                // Add each message to chat panel in order
                for (const msg of data.messages) {
                    let msgHtml = "";
                    if (msg.role === "user") {
                        msgHtml = `<p><div class='message-you'>${msg.content}</div></p>`;
                    } else {
                        msgHtml = `<p><div class='message-response-body'>${window.marked ? window.marked.parse(msg.content) : msg.content}</div></p>`;
                    }
                    $("#chat-panel").append(msgHtml);
                }
                // Scroll to bottom
                $("#chat-panel").animate({ scrollTop: $("#chat-panel")[0].scrollHeight }, "fast");
            })
            .catch(err => {
                console.error("Error loading chat history:", err);
            });
    });

    // Handle delete button click
    $("#delete-conversation-btn").on("click", function () {
        const conversationId = $("#chat-history-select").val();

        if (!conversationId) {
            return;
        }

        // Confirm deletion
        if (!confirm("Are you sure you want to delete this conversation? This action cannot be undone.")) {
            return;
        }

        // Disable button during deletion
        $(this).prop('disabled', true);

        // Send delete request
        fetch(`/chat_history/${conversationId}`, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json',
            }
        })
            .then(response => {
                if (response.ok) {
                    // Remove the option from select
                    $(`#chat-history-select option[value="${conversationId}"]`).remove();

                    // Reset to "New Conversation"
                    $("#chat-history-select").val("").trigger("change");

                    // Show success message (optional)
                    alert("Conversation deleted successfully");
                    window.location.reload();
                } else {
                    throw new Error('Failed to delete conversation');
                }
            })
            .catch(err => {
                console.error("Error deleting conversation:", err);
                alert("Failed to delete conversation. Please try again.");
            })
            .finally(() => {
                // Re-enable button
                $(this).prop('disabled', false);
            });
    });
</script>
