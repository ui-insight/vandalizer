<div class="tab-content" id="chat-panel">
    <div class="chat-card-container">
        <div class="loading-event-progress-container" style="display: none;">
            <div class="loading-event-progress-content">
                <div id="loading-event-progress">
                    <i id="loading-event-icon" class="fa-solid fa-file-import"></i>
                    <h2 id="loading-event-title">Ready to get started?</h2>
                    <p id="loading-event-message">Just add or select a document to begin.</p>
                    <p id="loading-event-title"></p>
                    <div class="loading-progress-bar">
                        <div class="loading-progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="recommendations-panel">
    </div>

    {% include "chat/chat_search_panel.html" %}
</div>

<style>
    .btn-icon-danger {
        background-color: #dc3545;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    .btn-icon-danger:hover {
        background-color: #c82333;
    }

    .btn-icon-danger:disabled {
        background-color: #6c757d;
        cursor: not-allowed;
        opacity: 0.6;
    }
</style>

<script>
    const chatConversation = {{ chat_conversation | tojson | safe if chat_conversation else 'null' }};

    function toHtml(markdown) {
        const outputText = markdown.replace(/^```(html|json|markdown)?\s*|\s*```$/g, '');
        const rawText = window.marked.parse(outputText, {
            gfm: true,
            breaks: false,
        });
        return rawText;
    }

 function createDocumentAttachment(attachment) {
     const content_preview = attachment.content ? attachment.content.slice(0, 500) : '';

     const preview = `<div style="font-size: 0.85em; color: #666; margin-top: 5px; padding: 5px; background: white; border-radius: 3px; max-height: 60px; overflow: hidden;">${escapeHtml(content_preview)}</div>`;
     const content_length = attachment.content.length;

     return `
        <div class="system-message" style="padding: 10px; margin: 10px 0; background: #f0f0f0; border-radius: 5px;">
            <i class="fa fa-file"></i> Added document: <strong>${attachment.filename}</strong>
            <button class="btn btn-sm btn-link" onclick="removeChatAttachment('${attachment.id}', this)" 
                    style="float: right; padding: 0; color: #999;" title="Remove">
                <i class="fa fa-times"></i>
            </button>
            <div style="font-size: 0.9em; color: #666; margin-top: 5px;">
                Content loaded (${content_length} chars)
            </div>
            ${preview}
        </div>
     `
 }

 function createUrlAttachment(attachment) {
     const link = attachment.url;
     // limited to first 500 characters
     const content_preview = attachment.content ? attachment.content.slice(0, 500) : '';
     return `

        <div class="system-message" style="padding: 10px; margin: 10px 0; background: #f0f0f0; border-radius: 5px;">
            <i class="fa fa-link"></i> Added link: <a href="${link}" target="_blank">${attachment.title || link}</a>
            <div style="font-size: 0.9em; color: #666; margin-top: 5px;">
                Content loaded (${content_preview ? content_preview.length + ' chars' : '0 chars'})
            </div>
        </div>
     `
}
    // "[Link attached: pydantic_ai.run - Pydantic AI]
    // URL: https://ai.pydantic.dev/api/run/#pydantic_ai.run.AgentRun]"
    // "📎 File attached: Test_test_test.docx (14 characters)"

    console.log("chatConversation: ", chatConversation);

    if (!chatConversation || (chatConversation && chatConversation.messages.length === 0)) {
        // Clear chat history if "New Conversation" is chosen
        $("#chat-panel .message-you, #chat-panel .message-response-body").parent().remove();
    } else {
        $('.loading-event-progress-container')[0].style.display = 'none';
        // Clear previous messages
        $("#chat-panel .message-you, #chat-panel .message-response-body").parent().remove();
        // Add each message to chat panel in order
        for (const msg of chatConversation.messages) {
            let msgHtml = "";
            if (msg.role === "user") {
                // if the msg start with '[Link attached: url_attachment.title]' is a link message
                if(msg.message.startsWith('[Link attached')) {
                    const attachment = chatConversation.url_attachments.find(att => msg.message.startsWith(`[Link attached: ${att.title}]`));
                    console.log("link attachment: ", attachment);
                    msgHtml = createUrlAttachment(attachment);
                }
                else if(msg.message.startsWith('📎 File attached')) {
                    const attachment = chatConversation.file_attachments.find(att => msg.message.startsWith(`📎 File attached: ${att.filename}`));
                    console.log("file attachment: ", attachment);
                    msgHtml = createDocumentAttachment(attachment);
                }
                else {
                    msgHtml = `<p><div class='message-you'>${toHtml(msg.message)}</div></p>`;
                }
            } else {
                msgHtml = `<p><div class='message-response'>${toHtml(msg.message)}</div></p>`;
            }
            $("#chat-panel").append(msgHtml);
        }
        // Scroll to bottom
        $("#chat-panel").animate({ scrollTop: $("#chat-panel")[0].scrollHeight }, "fast");
    }
</script>
