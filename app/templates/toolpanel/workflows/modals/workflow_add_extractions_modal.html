<div id="workflowAddExtractionsModal" class="modal informationmodal" style="display: block;">
    <div class="workflow-modal-content" style="margin: 5% auto; max-width: 500px; padding: 20px; border-radius: 8px;">
        <h2 style="margin-top: 0; text-align: left; font-size: 24px;">Add Extractions</h2>

        <!-- Tabbed navigation -->
        <div class="workflow-tab-container">
            <button class="workflow-tab-btn active" id="selectDropdownTab" onclick="openAddExtractionTab('selectDropdown')">Select from Tasks</button>
            <button class="workflow-tab-btn " id="manualInputTab" onclick="openAddExtractionTab('manualInput')">Enter Manually</button>
        </div>

        <!-- Tab content for dropdown selection -->
        <div class="workflow-tab-content" id="selectDropdown" style="display: block;">
            <label for="extractionSetDropdown" class="workflow-label">Select an extraction set:</label>
            <select id="extractionSetDropdown" class="workflow-input-field">
               <option value="Create a new set">Create a new set</option>
               {% for extraction in extraction_sets %}
               <option value="{{ extraction.uuid }}">{{ extraction.title }}</option>
               {% endfor %}
            </select>
        </div>

        <!-- Tab content for manual input -->
        <div class="workflow-tab-content" id="manualInput" style="display: none; margin: 0 auto;">
            <label for="extractionInput" class="label">Enter extractions (comma-separated):</label>
            <input type="text" id="extractionInput" placeholder="e.g., Name, Age, Location" class="input-field">
        </div>        

        <!-- Action buttons -->
         <div style="padding: 30px 0px 0px 0px; margin: 0 auto;">
        <button id="confirmExtractionStepBtn" class="btn btn-primary">Add Extractions</button>
        <button id="closeAddExtractionToWorkflowBtn" class="btn btn-secondary">Close</button>
    </div>
    </div>
    <script>
        function openAddExtractionTab(tabName) {
            // Hide all tab content
            document.querySelectorAll('.workflow-tab-content').forEach(content => content.style.display = 'none');
            // Remove active class from all tab buttons
            document.querySelectorAll('.workflow-tab-btn').forEach(btn => btn.classList.remove('active'));
            // Show the selected tab content and mark the button as active
            document.getElementById(tabName).style.display = 'block';
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        $('#closeAddExtractionToWorkflowBtn').on("click", function (e) {
        e.preventDefault();  // Prevent default behavior, if needed
        $('#workflowAddExtractionsModal').remove();
    });
    </script>
    
</div>
