<div id="workflowAddFormattingModal" class="modal informationmodal" style="display: block;">
    <div class="workflow-modal-content" style="margin: 5% auto; max-width: 500px; padding: 20px; border-radius: 8px;">
        <h2 style="margin-top: 0; text-align: left; font-size: 24px;">Add Formatting</h2>

        <!-- Tabbed navigation -->
        <div class="workflow-tab-container">
            <button class="workflow-tab-btn {% if not (is_editing and 'search_set_uuid' in workflow_step.data) %}active{% endif %}" 
                    id="selectDropdownTab" 
                    onclick="openAddExtractionTab('selectDropdown')">
                Select from Tasks
            </button>
            <button class="workflow-tab-btn {% if (is_editing and 'search_set_uuid' in workflow_step.data) %}active{% endif %}" 
                    id="manualInputTab" 
                    onclick="openAddExtractionTab('manualInput')">
                Enter Manually
            </button>
        </div>

        <!-- Tab content for dropdown selection -->
        <div class="workflow-tab-content" id="selectDropdown" style="{% if not (is_editing and 'search_set_uuid' in workflow_step.data) %}display: none;{% else %}display: block;{% endif %}">
            <label for="formatSetDropdown" class="workflow-label">Select an format task:</label>
            <select id="formatSetDropdown" class="workflow-input-field">
                {% for prompt in prompts %}
                <option value="{{ prompt.id }}" {% if is_editing and 'search_set_uuid' in workflow_step.data and workflow_step.data['search_set_uuid'] == extraction.uuid %}selected{% endif %}>{{ extraction.title }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Tab content for manual input -->
        <div class="workflow-tab-content" id="manualInput" style="{% if not (is_editing and 'searchphrases' in workflow_step.data) %}display: none;{% else %}display: block;{% endif %} margin: 0 auto;">
            <label for="extractionInput" class="label">Enter extractions (comma-separated):</label>
            <input type="text" id="extractionInput" 
                placeholder="e.g., Name, Age, Location" 
                class="input-field"
                value="{{ workflow_step.data['searchphrases'] if is_editing and 'searchphrases' in workflow_step.data else '' }}">
        </div>

        

        <!-- Action buttons -->
         <div style="padding: 30px 0px 0px 0px; margin: 0 auto;">
        <button id="confirmFormatStepBtn" class="btn btn-primary">Add Formatting</button>
        <button id="closeAddFormatToWorkflowBtn" class="btn btn-secondary">Close</button>
    </div>
    </div>
    <script>
        function openAddExtractionTab(tabName) {
            // Hide all tab content
            document.querySelectorAll('.workflow-tab-content').forEach(content => content.style.display = 'none');
            // Remove active class from all tab buttons
            document.querySelectorAll('.workflow-tab-btn').forEach(btn => btn.classList.remove('active'));
            // Show the selected tab content and mark the button as active
            document.getElementById(tabName).style.display = 'block';
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        $('#closeAddFormatToWorkflowBtn').on("click", function (e) {
        e.preventDefault();  // Prevent default behavior, if needed
        $('#workflowAddFormattingModal').remove();
    });
    </script>
    
</div>
