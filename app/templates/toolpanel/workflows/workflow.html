
<div class="workflow-container">
    <div>
    <p style="font-size: 24px; font-weight: 600;">

        {{ workflow.name }}
    
        <span id="workflow-close-button" style="float: right; font-size: 1em; color: #5c21d2bc;">
            <a>
                <i class="fa-solid fa-circle-xmark"></i>
            </a>
        </span>
    </p>
</div>
    <div class="trigger">Trigger</div>

    <div class="workflow-step active">
        <div class="step-content">
            <div class="add-task-icon-container">
                <i class="fa-regular fa-file-lines" style="font-size: 24px;"></i>
            </div>
            <div class="step-header">
                <span>Documents Selected</span>
                <span class="attachment-info">None selected + 1 attached</span>
            </div>
            <div class="step-icon">
                <i class="fa-solid fa-sliders" style="font-size: 18px; font-weight: 300; color: #46464681;"></i>
            </div>
        </div>
        <div class="step-connector bottom">
            <img src='/static/images/step-connector-bottom-active.png'> 
        </div>
    </div>
    <div class="step-connection-line"></div>

    <div class="workflow-step">
        <div class="step-connector top">
            <img src='/static/images/step-connector-top.png'> 
        </div>
        <div class="step-content">
            <div class="add-task-icon-container">
                <i class="fa-regular fa-filter" style="font-size: 24px; color: #D44C4C;"></i>
            </div>
            <div class="step-header">
                <span>Extract Information</span>
                <span class="item-info">NSF Budget 16 items</span>
            </div>
            <div class="step-icon">
                <i class="fa-solid fa-sliders" style="font-size: 18px; font-weight: 300; color: #46464681;"></i>
            </div>
        </div>
        <div class="step-connector bottom">
            <img src='/static/images/step-connector-bottom.png'> 
        </div>
    </div>
    <div class="step-connection-line"></div>
