<div class="bottom-toolbar" id="bottom-toolbar-chat"
                style="{% if section != 'Chat' %}display: none;{% endif %}">
                <div id="add-item-panel">
                    <p style="font-size: 24px; font-weight: 600;">How can I help?</p>

                    <div class="ask-question-container">
                        <div class="ask-question">
                            <div class="w-full sticky bottom-0  mx-auto">
                                <div class="relative px-2 md:px-1">
                                    <div>
                                        <div class="relative z-10">
                                            <div>
                                                <fieldset style="padding-left: 15px;" data-has-accessory-warning="false"
                                                    class="flex items-start relative z-[5]">
                                                    <div class="absolute bottom-full left-0 w-full text-center pb-1 px-2 sm:px-5 leading-tight [text-shadow:_0_0_0.25rem_hsl(var(--bg-200))]">
                                                    </div>
                                                    <div class="flex flex-col flex-1">
                                                        <div class="flex items-start gap-4">
                                                            <div class="flex-1">
                                                                <div class="flex items-center flex-grow break-words min-w-0">
                                                                    <div class="flex flex-col w-full">
                                                                        <div class="overflow-y-auto w-full max-h-96 break-words py-4">
                                                                            <div id="chatinput" contenteditable="true" translate="no"
                                                                                enterkeyhint="enter" tabindex="0"
                                                                                class="ProseMirror break-words max-w-[60ch]">
                                                                                <p id="chatplaceholder" data-placeholder="Chat with document..."
                                                                                    class="is-empty is-editor-empty before:!text-text-500 before:whitespace-nowrap">

                                                                                </p>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <div class="grid  grid-flow-col  items-center  mt-3  -mr-1.5">
                                                                <button class="add-button shadow-button" id="chat-button">
                                                                    <span style="font-size: 2em; color: #5c21d2bc;">
                                                                        <i class="fa-brands fa-searchengin"></i>
                                                                    </span>
                                                                </button>
                                                            </div>
                                                        </div>
                                                </fieldset>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
