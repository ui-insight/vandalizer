<div class="bottom-toolbar" id="bottom-toolbar-prompt"
                style="{% if section != 'Prompt' %}display: none;{% endif %}">
                <div id="add-item-panel">
                    <p style="font-size: 24px; font-weight: 600;">Add Prompt</p>

                    <div class="ask-question-container">
                        <div class="ask-question">
                            <div class="w-full sticky bottom-0  mx-auto">
                                <div class="relative px-2 md:px-1">
                                    <div>
                                        <div class="relative z-10">
                                            <div>
                                                <fieldset style="padding-left: 15px;" data-has-accessory-warning="false"
                                                    class="flex items-start relative z-[5]">
                                                    <div class="absolute  bottom-full  left-0  w-full  text-center  pb-1  px-2  sm:px-5  leading-tight  [text-shadow:_0_0_0.25rem_hsl(var(--bg-200))]">
                                                    </div>
                                                    <div class="flex flex-col flex-1">
                                                        <div class="flex items-start gap-4">
                                                            <div class="flex-1">
                                                                <div
                                                                    class="flex items-center flex-grow break-words min-w-0">
                                                                    <div class="flex flex-col w-full">
                                                                        <div
                                                                            class="overflow-y-auto w-full max-h-96 break-words py-4">
                                                                            <div id="promptinput" contenteditable="true" translate="no"
                                                                                enterkeyhint="enter" tabindex="0"
                                                                                class="ProseMirror break-words max-w-[60ch]">
                                                                                <p id="promptplaceholder" data-placeholder="Prompt to ask document..."
                                                                                    class="is-empty is-editor-empty before:!text-text-500 before:whitespace-nowrap">
                                                                                    <br
                                                                                        class="ProseMirror-trailingBreak">
                                                                                </p>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <div
                                                                class="grid  grid-flow-col  items-center  mt-3  -mr-1.5">
                                                                <button class="add-button shadow-button" id="add-attachment-button">
                                                                    <span style="font-size: 2em; color: #5c21d2bc;">
                                                                        <i class="fa-solid fa-paperclip"></i>
                                                                    </span>
                                                                </button>
                                                                <button class="add-button shadow-button" id="add-term-button">
                                                                    <span style="font-size: 2em; color: #5c21d2bc;">
                                                                        <i class="fa-solid fa-plus"></i>
                                                                    </span>
                                                                </button>
                                                            </div>
                                                        </div>
                                                        
                                                </fieldset>
                                                <div id="attachment-list"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
