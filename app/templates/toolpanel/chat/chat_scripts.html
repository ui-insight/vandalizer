<script>
    const placeholderText = "Ask anything about this document…";
    let chatReponse = null;

    // This function runs once the page is fully loaded
    $(document).ready(function () {
        // Fix: Ensures the placeholder and button are set correctly on initial load.
        const hasText = $("#chatinput").text().trim().length > 0;
        $("#send-chat-button").prop('disabled', !hasText);

        if (!hasText) {
            $("#chatplaceholder").attr("data-placeholder", placeholderText);
        } else {
            $("#chatplaceholder").attr("data-placeholder", "");
        }
    });

    // This listener now toggles the disabled property of the send button
    $("#chatinput").on("input", function () {
        const hasText = $(this).text().trim().length > 0;
        const placeholder = $("#chatplaceholder");
        const sendButton = $("#send-chat-button");

        sendButton.prop('disabled', !hasText);

        if (hasText) {
            placeholder.attr("data-placeholder", "");
        } else {
            placeholder.attr("data-placeholder", placeholderText);
        }
    });

    // Updated keydown listener for Enter and the new Backspace feature
    $("#chatinput").on("keydown", function (event) {
        const text = $(this).text().trim();


        // Prevent a leading space in an empty editor
        if (event.key === " " && text.length === 0) {
            event.preventDefault();
            return;
        }

        // Prevent Backspace → browser‑back when empty
        if (event.key === "Backspace" && text.trim().length === 0) {
            event.preventDefault();
        }

        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            if (!$("#send-chat-button").is(":disabled")) {
                $("#send-chat-button").click();
            }
        }
    });


    // Click handler for the send button
    $("#send-chat-button").on("click", function (e) {
        e.preventDefault();
        if (document_uuids != "") {
            chat();
        } else {
            showToast("Select a document to chat");
        }
    });

    // Click handler for the tasks link
    $("#tasks-link").on("click", function (e) {
        e.preventDefault();
        setSection("Tasks");
        $("#tasks-panel").show();
    });


    function chat() {
        let question = $("#chatinput").text();
        beginChat(question);
    }

    function beginChat(question) {
        performChat(document_uuids, question, folder_uuid);
        search_set_add_uuid = "";
        is_adding_term = false;
    }

    function performChat(
        document_uuids,
        question,
        folder_uuid,
        additional_context = "",
        display_question = "",
    ) {
        $("#send-chat-button").prop('disabled', true);
        $(".chat-card-container").hide();

        let questionToDisplay = display_question === "" ? question : display_question;

        let messageHtml = "<p><div class='message-you'>" + questionToDisplay + "</div></p>";
        $("#chat-panel").append(messageHtml);

        $("#chatinput").text(""); // Clear the text
        $("#chatinput").addClass("is-empty is-editor-empty"); // Re-apply classes
        $("#chatinput").attr("data-placeholder", placeholderText); // Ensure data-attribute is set

        let responseId = "response-" + new Date().getTime();
        $("#chat-panel").append(
            `<p>
                <div class='message-response' id='${responseId}'>
                    <div class='chat-loader' style='display: inline-block;'></div>
                </div>
            </p>`
        );

        $("#chat-panel").animate({ scrollTop: $("#chat-panel")[0].scrollHeight }, "slow");

        fetch("/home/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json; charset=utf-8" },
            body: JSON.stringify({
                document_uuids: document_uuids,
                message: question + " " + additional_context,
                folder_uuid: folder_uuid,
            })
        })
            .then(response => {
                if (!response.body) throw new Error("No response body");
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let markdownBuffer = "";
                let thinkingBuffer = "";
                let questionText = question + " " + additional_context;
                let buffer = ""; // For handling partial JSON chunks

                $("#" + responseId).html(
                    `<div style='display: flex; flex-direction: column;'>
                        <div class='thinking-panel' style='display: none; background: #f5f5f5; padding: 10px; border-radius: 5px; margin-bottom: 10px;'>
                            <div class='thinking-header' style='cursor: pointer; font-weight: bold;'>
                                <span class='thinking-toggle'>▶</span> Thinking...
                            </div>
                            <div class='thinking-content' style='display: none; margin-top: 10px; font-family: monospace; white-space: pre-wrap;'></div>
                        </div>
                        <div style='display: flex;'>
                            <div style='flex-grow: 1;'>
                                <div class="chat-response-body" id="streamedResponse"></div>
                            </div>
                        </div>
                    </div>`
                );

                // Add click handler for thinking panel toggle
                $("#" + responseId + " .thinking-header").on("click", function () {
                    const $content = $(this).siblings(".thinking-content");
                    const $toggle = $(this).find(".thinking-toggle");
                    if ($content.is(":visible")) {
                        $content.hide();
                        $toggle.text("▶");
                    } else {
                        $content.show();
                        $toggle.text("▼");
                    }
                });

                function pump() {
                    return reader.read().then(({ done, value }) => {
                        if (done) {
                            let $responseDiv = $("<div>")
                                .addClass("message-response-body")
                                .attr({
                                    "data-question": questionText,
                                    "data-answer": markdownBuffer,
                                    "data-thinking": thinkingBuffer,
                                    "data-context": "",
                                    "data-document-uuids": document_uuids.join(","),
                                })
                                .html(marked.parse(markdownBuffer))
                                .append(createFeedbackButtons());

                            $("#" + responseId + " .chat-response-body").replaceWith($responseDiv);

                            if (isScrolledToBottom($("#chat-panel")[0])) {
                                $("#chat-panel").animate({ scrollTop: $("#chat-panel")[0].scrollHeight }, "fast");
                            }

                            $(".copy-btn").on("click", function () {
                                let responseHtml = $(this).closest('[id^="response"]').find(".message-response-body").html().trim();
                                copyRichTextToClipboard(responseHtml);
                            });
                            return;
                        }

                        let chunk = decoder.decode(value, { stream: true });
                        buffer += chunk;

                        // Process complete JSON lines
                        let lines = buffer.split('\n');
                        buffer = lines.pop(); // Keep incomplete line in buffer

                        for (let line of lines) {
                            if (line.trim()) {
                                try {
                                    let data = JSON.parse(line);

                                    if (data.kind === "text") {
                                        markdownBuffer += data.content;
                                        $("#streamedResponse").html(marked.parse(markdownBuffer));
                                    } else if (data.kind === "thinking") {
                                        thinkingBuffer += data.content;
                                        const $thinkingPanel = $("#" + responseId + " .thinking-panel");
                                        $thinkingPanel.show();
                                        $thinkingPanel.find(".thinking-content").text(thinkingBuffer);
                                    }
                                } catch (e) {
                                    console.error("Error parsing JSON:", e, "Line:", line);
                                }
                            }
                        }

                        return pump();
                    });
                }
                return pump();
            })
            .catch(error => {
                console.log("Stream error", error);
            });
    }

    function isScrolledToBottom(el, threshold = 30) {
        return el.scrollHeight - el.scrollTop - el.clientHeight < threshold;
    }

    function copyRichTextToClipboard(html) { /* ... */ }
    function createFeedbackButtons() { /* ... */ }
</script>
