<script>
    const PLACEHOLDER = "Ask vandalizer anything...";

    // Utility: keep editor empty-state + button in sync
    function updateEditorState() {
        const $input = $("#chatinput");
        const hasText = $input.text().trim().length > 0;
        $input.toggleClass("is-editor-empty", !hasText);
        $("#send-chat-button").prop("disabled", !hasText);
    }

    // On load
    $(document).ready(function () {
        $("#chatinput").attr("data-placeholder", PLACEHOLDER);
        updateEditorState();
    });

    // Input changes (typing, paste, IME, etc.)
    $("#chatinput").on("input", function () {
        updateEditorState();
    });

    // Keydown guards + Enter-to-send
    $("#chatinput").on("keydown", function (event) {
        const text = $(this).text().trim();

        // Prevent a leading space in an empty editor
        if (event.key === " " && text.length === 0) {
            event.preventDefault();
            return;
        }

        // Prevent Backspace → browser-back when empty
        if (event.key === "Backspace" && text.length === 0) {
            event.preventDefault();
            return;
        }

        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            if (!$("#send-chat-button").is(":disabled")) {
                $("#send-chat-button").click();
            }
        }
    });

    // Click handler for the send button
    $("#send-chat-button").on("click", function (e) {
        e.preventDefault();
        chat();
    });

    // Click handler for the tasks link
    $("#tasks-link").on("click", function (e) {
        e.preventDefault();
        setSection("Tasks");
        $("#tasks-panel").show();
    });

    function chat() {
        let question = $("#chatinput").text();
        beginChat(question);
    }

    function beginChat(question) {
        performChat(document_uuids, question, folder_uuid);
        search_set_add_uuid = "";
        is_adding_term = false;
    }

    // --- Only the clearing/placeholder part changes inside performChat ---
    function performChat(
        document_uuids,
        question,
        folder_uuid,
        additional_context = "",
        display_question = ""
    ) {
        $("#send-chat-button").prop("disabled", true);
        $(".chat-card-container").hide();

        const questionToDisplay = display_question === "" ? question : display_question;

        $("#chat-panel").append("<p><div class='message-you'>" + questionToDisplay + "</div></p>");

        // Clear editor correctly and restore placeholder state
        $("#chatinput").empty().addClass("is-editor-empty");
        // keep placeholder text synced (optional if static)
        $("#chatinput").attr("data-placeholder", PLACEHOLDER);

        const responseId = "response-" + new Date().getTime();
        $("#chat-panel").append(
            `<p>
        <div class='message-response' id='${responseId}'>
          <div class='chat-loader' style='display: inline-block;'></div>
        </div>
      </p>`
        );

        $("#chat-panel").animate({ scrollTop: $("#chat-panel")[0].scrollHeight }, "slow");

        fetch("/home/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json; charset=utf-8" },
            body: JSON.stringify({
                document_uuids: document_uuids,
                message: question + " " + additional_context,
                folder_uuid: folder_uuid,
            }),
        })
            .then((response) => {
                if (!response.body) throw new Error("No response body");
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let markdownBuffer = "";
                let thinkingBuffer = "";
                let questionText = question + " " + additional_context;
                let buffer = ""; // For handling partial JSON chunks

                $("#" + responseId).html(
                    `<div style='display: flex; flex-direction: column;'>
            <div class='thinking-panel' style='display: none; background: #f5f5f5; color: ffffff55; padding: 10px; border-radius: 5px; margin-bottom: 10px;'>
              <div class='thinking-header' style='cursor: pointer; font-weight: bold;'>
                <span class='thinking-toggle'>▶</span> Show Thinking
              </div>
              <div class='thinking-content' style='display: none; margin-top: 10px; font-family: monospace; white-space: pre-wrap;'></div>
            </div>
            <div style='display: flex;'>
              <div style='flex-grow: 1;'>
                <div class="chat-response-body" id="streamedResponse"></div>
              </div>
            </div>
          </div>`
                );

                // Thinking panel toggle
                $("#" + responseId + " .thinking-header").on("click", function () {
                    const $content = $(this).siblings(".thinking-content");
                    const $toggle = $(this).find(".thinking-toggle");
                    if ($content.is(":visible")) {
                        $content.hide();
                        $toggle.text("▶");
                    } else {
                        $content.show();
                        $toggle.text("▼");
                    }
                });

                function pump() {
                    return reader.read().then(({ done, value }) => {
                        if (done) {
                            const outputText = markdownBuffer.replace(/^```(html|json|markdown)?\s*|\s*```$/g, "");
                            let $responseDiv = $("<div>")
                                .addClass("message-response-body")
                                .attr({
                                    "data-question": questionText,
                                    "data-answer": markdownBuffer,
                                    "data-thinking": thinkingBuffer,
                                    "data-context": "",
                                    "data-document-uuids": document_uuids.join(","),
                                })
                                .html(window.marked.parse(outputText))
                                .append(createFeedbackButtons());

                            $("#" + responseId + " .chat-response-body").replaceWith($responseDiv);

                            if (isScrolledToBottom($("#chat-panel")[0])) {
                                $("#chat-panel").animate({ scrollTop: $("#chat-panel")[0].scrollHeight }, "fast");
                            }

                            $(".copy-btn").on("click", function () {
                                let responseHtml = $(this).closest('[id^="response"]').find(".message-response-body").html().trim();
                                copyRichTextToClipboard(responseHtml);
                            });
                            $(".download-btn").on("click", function () {
                                const $body = $(this)
                                    .closest('[id^="response"]')
                                    .find(".message-response-body")
                                    .first()
                                    .clone();

                                // Remove the feedback row(s) just for the download payload
                                $body.find(".feedback-buttons").remove();

                                // (Optional) If your popup menu ever gets injected inside the body, strip it too
                                $body.find("#chat-model-popup-menu").remove();
                                const responseHtml = $body.html().trim();
                                attachChatDownloadUI(this, responseHtml);
                            });
                            return;
                        }

                        let chunk = decoder.decode(value, { stream: true });
                        buffer += chunk;

                        // Process complete JSON lines
                        let lines = buffer.split("\n");
                        buffer = lines.pop(); // Keep incomplete line in buffer

                        for (let line of lines) {
                            if (line.trim()) {
                                try {
                                    let data = JSON.parse(line);

                                    if (data.kind === "text") {
                                        markdownBuffer += data.content;
                                        const outputText = markdownBuffer.replace(/^```(html|json|markdown)?\s*|\s*```$/g, "");
                                        const markdownContent = window.marked.parse(outputText);
                                        $("#streamedResponse").html(markdownContent);
                                    } else if (data.kind === "thinking") {
                                        thinkingBuffer += data.content;
                                        const $thinkingPanel = $("#" + responseId + " .thinking-panel");
                                        $thinkingPanel.show();
                                        $thinkingPanel.find(".thinking-content").text(thinkingBuffer);
                                    }
                                } catch (e) {
                                    console.error("Error parsing JSON:", e, "Line:", line);
                                }
                            }
                        }

                        return pump();
                    });
                }
                return pump();
            })
            .catch((error) => {
                console.log("Stream error", error);
            });
    }

    function isScrolledToBottom(el, threshold = 30) {
        return el.scrollHeight - el.scrollTop - el.clientHeight < threshold;
    }

    function copyRichTextToClipboard(html) {
        // Create a temporary element
        const container = document.createElement('div');
        container.innerHTML = html;

        // Try to use the modern clipboard API first
        try {
            // For plain text fallback
            const textContent = container.textContent || container.innerText;

            // Try to copy as HTML if supported
            if (navigator.clipboard && navigator.clipboard.write) {
                const blob = new Blob([html], { type: 'text/html' });
                const clipboardItem = new ClipboardItem({ 'text/html': blob });
                return navigator.clipboard.write([clipboardItem]).then(() => {
                    console.log('Rich text copied');
                    showToast("Copied to clipboard");
                })
                    .catch(err => {
                        console.warn('Rich text copy failed, falling back to plain text', err);
                        return navigator.clipboard.writeText(textContent);
                    });
            } else {
                // Fall back to plain text
                return navigator.clipboard.writeText(textContent);
            }
        } catch (err) {
            console.warn('Modern clipboard API failed, using fallback', err);
            // Fallback for Safari and older browsers
            return new Promise((resolve, reject) => {
                const textarea = document.createElement('textarea');
                textarea.value = container.textContent || container.innerText;
                textarea.style.position = 'fixed';
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();

                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        resolve();
                    } else {
                        reject(new Error('execCommand failed'));
                    }
                } catch (err) {
                    reject(err);
                } finally {
                    document.body.removeChild(textarea);
                }
            });
        }
    }

    function createFeedbackButtons() {
        const feedbackDiv = document.createElement("div");
        feedbackDiv.className = "feedback-buttons";
        // align to bottom-right without needing extra CSS files
        feedbackDiv.style.display = "flex";
        feedbackDiv.style.justifyContent = "flex-end";
        feedbackDiv.style.gap = "12px";
        feedbackDiv.style.marginTop = "30px";

        // "Link-like" button style
        const makeLinkBtn = (text, className) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = className + " btn btn-secondary"; // e.g., "copy-btn" or "download-btn"
            btn.textContent = text;
            btn.style.fontSize = "10px";
            return btn;
        };

        const copyBtn = makeLinkBtn("Copy", "copy-btn");
        const downloadBtn = makeLinkBtn("Download", "download-btn");

        feedbackDiv.appendChild(copyBtn);
        feedbackDiv.appendChild(downloadBtn);
        return feedbackDiv;
    }


    function attachChatDownloadUI(downloadBtnEl, htmlMarkup) {
        // Ensure the chat popup exists (create if missing)
        let $menu = $('#chat-download-popup-menu');
        if ($menu.length === 0) {
            $menu = $(`
      <div id="chat-model-popup-menu" class="file-popup-menu" style="display:none; position:absolute; z-index:10000;">
        <ul id="chat-model-popup-menu-options">
          <li id="download-pdf-option-chat">Download as PDF</li>
          <li id="download-csv-option-chat">Download as CSV</li>
          <li id="download-text-option-chat">Download as Text</li>
        </ul>
      </div>
    `).appendTo(document.body);
        }

        let isOpen = false;

        function positionAndShowMenu(anchorEl) {
            const rect = anchorEl.getBoundingClientRect();
            // position near the button, tweak offsets to taste
            const top = rect.bottom + window.scrollY + 6;
            const left = rect.left + window.scrollX;
            $menu.css({ top: `${top}px`, left: `${left}px` }).show();
            isOpen = true;

            // Close on outside click (namespaced & added only while open)
            setTimeout(() => {
                $(document).on('click.chatDl', (e) => {
                    if (!$(e.target).closest('#chat-model-popup-menu').length) hide();
                });
            }, 0);
        }

        function hide() {
            $menu.hide();
            $(document).off('click.chatDl');
            isOpen = false;
        }

        if (isOpen) { hide(); return; }
        positionAndShowMenu(downloadBtnEl);

        // Scoped handlers: bind to the menu element (not document)
        $menu.off('click.chatDl');
        $menu.on('click.chatDl', '#download-pdf-option-chat', async (e) => {
            e.stopPropagation(); hide();
            await downloadChatOutput('pdf', htmlMarkup);
        });
        $menu.on('click.chatDl', '#download-csv-option-chat', async (e) => {
            e.stopPropagation(); hide();
            await downloadChatOutput('csv', htmlMarkup);
        });
        $menu.on('click.chatDl', '#download-text-option-chat', async (e) => {
            e.stopPropagation(); hide();
            await downloadChatOutput('txt', htmlMarkup);
        });

        // Expose hide if you need to close from elsewhere
        return { hide };
    }

    /** Chat-specific downloader that calls your /chat/download route */
    async function downloadChatOutput(fmt, html) {
        try {
            if (typeof showToast === 'function') showToast('Preparing download…');

            // Server expects query args even for POST
            const params = new URLSearchParams({ format: fmt, content: html });
            const url = `/home/chat/download?${params.toString()}`;

            const resp = await fetch(url, { method: 'POST' });
            if (!resp.ok) {
                const text = await resp.text().catch(() => '');
                throw new Error(`Download failed (${resp.status}): ${text.slice(0, 200)}`);
            }

            // Parse filename from headers or fallback by fmt
            let filename = `chat_output.${fmt === 'pdf' ? 'pdf' : fmt === 'csv' ? 'csv' : 'txt'}`;
            const cd = resp.headers.get('Content-Disposition') || resp.headers.get('content-disposition');
            if (cd) {
                const m = cd.match(/filename\*?=(?:UTF-8''|")?([^";]+)/i);
                if (m && m[1]) {
                    try { filename = decodeURIComponent(m[1].replace(/^"+|"+$/g, '')); } catch (_) { }
                }
            }

            const blob = await resp.blob();
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);

            if (typeof showToast === 'function') showToast(`Downloading ${filename}`);
        } catch (err) {
            console.error('Download error:', err);
            if (typeof showToast === 'function') showToast('Download failed. Copying to clipboard instead…');
            try {
                await copyRichTextToClipboard(html);
                if (typeof showToast === 'function') showToast('Copied to clipboard.');
            } catch (copyErr) {
                console.error('Clipboard fallback failed:', copyErr);
                if (typeof showToast === 'function') showToast('Could not copy to clipboard.');
            }
        }
    }
</script>
