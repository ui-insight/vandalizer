<script>
  const placeholderText = "Chat with document...";

  // Handle Enter and Shift+Enter keydown events
  $("#chatinput").on("keydown", function (event) {
    $("#chatplaceholder").attr("data-placeholder", "");
    $("#chatplaceholder").css("color", "black");

    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault(); // Prevent the default behavior of adding a newline
      // Trigger your JavaScript event here
      if (document_uuids != "") {
        chat();
        return;
      } else {
        showToast("Select a document to chat");
      }
    }
  });

  $("#chat-button").on("click", function (e) {
    e.preventDefault();
    console.log("chat button clicked");
    if (document_uuids != "") {
      chat();
      return;
    } else {
      showToast("Select a document to chat");
    }
  });

  function chat() {
    // let question = $("#chatinput")[0].textContent;

    let question = $("#chatinput")[0].textContent.trim().replace(/\n/g, " ");
    $("#chat-panel").append(
      "<p><div class='message-you'>" + question + "</div></p>",
    );

    function createFeedbackButtons(response, document_uuids, question) {
      const responseEncoded = encodeURIComponent(response);
      const questionEncoded = encodeURIComponent(question);
      return `
          <button onclick="sendFeedback('positive', '${questionEncoded}', '${document_uuids}', '${responseEncoded}', this)" class="mr-2">
              <i class="fas fa-thumbs-up text-blue-500"></i>
          </button>
          <button onclick="sendFeedback('negative', '${questionEncoded}', '${document_uuids}', '${responseEncoded}', this)" class="mr-2">
              <i class="fas fa-thumbs-down text-red-500"></i>
          </button>
      `;
    }
    // reset the chat
    $("#chatinput").find("p").text("");
    $.ajax({
      url: "/api/chat",
      type: "POST",
      data: JSON.stringify({
        document_uuids: document_uuids,
        message: question,
        folder_uuid: folder_uuid,
      }),
      contentType: "application/json; charset=utf-8",
      dataType: "json",
      async: true,
      success: function (response) {
        // reload page
        $("#chat-panel").append(
          "<p><div class='message-response'>" +
            response +
            createFeedbackButtons(response, document_uuids, question) +
            "</div></p>",
        );
        $("#chatplaceholder").attr("data-placeholder", "Chat with document...");
        $("#chatplaceholder").css("color", "darkgray");
      },
      error: function (xhr, ajaxOptions, thrownError) {
        console.log(xhr.status);
        console.log(thrownError);
      },
    });
    search_set_add_uuid = "";
    is_adding_term = false;
  }

  function sendFeedback(
    feedback_type,
    question,
    document_uuids,
    response,
    button,
  ) {
    const decodedQuestion = decodeURIComponent(question);
    const decodedResponse = decodeURIComponent(response);
    $.ajax({
      url: "/feedback",
      type: "POST",
      data: JSON.stringify({
        feedback_type: feedback_type,
        question: decodedQuestion,
        docs_uuids: document_uuids,
        response: decodedResponse,
      }),
      contentType: "application/json; charset=utf-8",
      dataType: "json",
      async: true,
      success: function (response) {
        // $(button).attr("disabled", true);
        // $(button).attr("style", "cursor: not-allowed;");
        // $(button).siblings("button").attr("disabled", true);
        console.log("Feedback sent successfully", response);
      },
      error: function (xhr, ajaxOptions, thrownError) {
        console.log(xhr.status);
        console.log(thrownError);
      },
    });
  }
</script>
