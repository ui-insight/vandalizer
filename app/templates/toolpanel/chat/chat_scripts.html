<script>
  const placeholderText = "Chat with document...";

  // Handle Enter and Shift+Enter keydown events
  $("#chatinput").on("keydown", function (event) {
    $("#chatplaceholder").attr("data-placeholder", "");
    $("#chatplaceholder").css("color", "black");

    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault(); // Prevent the default behavior of adding a newline
      // Trigger your JavaScript event here
      if (document_uuids != "") {
        chat();
        return;
      } else {
        showToast("Select a document to chat");
      }
    }
  });

  $("#chat-button").on("click", function (e) {
    e.preventDefault();
    console.log("chat button clicked");
    if (document_uuids != "") {
      chat();
      return;
    } else {
      showToast("Select a document to chat");
    }
  });

  $('#chat-suggestion-1').on("click", function (e) {
    e.preventDefault();
    console.log("chat button clicked");
    if (document_uuids != "") {
      performChat(document_uuids, "Summarize this document", folder_uuid);
      return;
    } else {
      showToast("Select a document to chat");
    }
  });

  $('#chat-suggestion-2').on("click", function (e) {
    e.preventDefault();
    console.log("chat button clicked");
    if (document_uuids != "") {
      performChat(document_uuids, "Help me understand what this is about", folder_uuid);
      return;
    } else {
      showToast("Select a document to chat");
    }
  });

  $('#chat-suggestion-3').on("click", function (e) {
    e.preventDefault();
    console.log("chat button clicked");
    if (document_uuids != "") {
      additional_context = "Vandalizer is the tool you are in now. It is a tool that helps you understand and analyze documents. You can use the extract tab to run extraction groups on a document. You can build a list of terms you would like to extract from a document, run them all. Tapping each one will copy the item to the clipboard and show it in the document. This is good for repetitive extraction tasks. Alternatively you can run prompt groups, these are more complicated questions that you would normally ask in chat. You can make sets of these that you do regularly on documents. You can also select multiple documents, or attach fillable pdfs to extraction groups. Read the document provided and tell the user how they might use any of these features on this particular document.";

      performChat(document_uuids, "Teach me how to use vandalizer on this", folder_uuid, additional_context);
      return;
    } else {
      showToast("Select a document to chat");
    }
  });

  function chat() {
    

    // Add the message response bubble with the icon and loader
    let question = $("#chatinput")[0].textContent;
    

    performChat(document_uuids, question, folder_uuid);

    search_set_add_uuid = "";
    is_adding_term = false;
  }

  function performChat(document_uuids, question, folder_uuid, additional_context = "") {
    $('.chat-card-container').hide();
    $("#chat-panel").append(
      "<p><div class='message-you'>" + question + "</div></p>",
    );
    // reset the chat
    $("#chatinput").find("p").text("");

    let responseId = "response-" + new Date().getTime(); // unique ID for the response bubble
    $("#chat-panel").append(
      `<p>
        <div class='message-response' id='${responseId}'>
          <img src='/static/images/Lightning_RGB+W.png' alt='Icon' style='vertical-align: middle; margin-right: 10px; width: 30px; height: 45px;'/>
          <div class='chat-loader' style='display: inline-block;'></div>
        </div>
      </p>`
    );

    $.ajax({
      url: "/api/chat",
      type: "POST",
      data: JSON.stringify({
        document_uuids: document_uuids,
        message: question + " " + additional_context,
        folder_uuid: folder_uuid,
      }),
      contentType: "application/json; charset=utf-8",
      dataType: "json",
      async: true,
      success: function (response) {
        // reload page
        $("#" + responseId).html(
          `<div style='display: flex; flex-direction: column;'>
            <div style='display: flex;'>
              <img src='/static/images/Lightning_RGB+W.png' alt='Icon' style='margin-right: 15px; width: 30px; height: 45px;'/>
              <div style='flex-grow: 1;'>
                <div class="chat-response-body">
                ${response}
                </div>
                <div style='padding-top: 10px;'>
                  <a style='color: #000000dd;' class='copy-btn'>
                    <i class='fa-regular fa-copy'></i>
                  </a>
                </div>
              </div>
            </div>
            
          </div>`
);


        $("#chatplaceholder").attr("data-placeholder", "Chat with document...");
        $("#chatplaceholder").css("color", "darkgray");

        // copy to clipboard
        $(".copy-btn").on("click", function () {
          let searchTerm = $(this).closest("div").text();
          navigator.clipboard.writeText(searchTerm);
          showToast("Copied to clipboard");
        });
      },
      error: function (xhr, ajaxOptions, thrownError) {
        console.log(xhr.status);
        console.log(thrownError);
      },
    });
  }
</script>
