<div class="app-rail" id="app-rail" aria-expanded="true">
    <div class="rail-header">
        <div class="rail-header-content">
            <div class="rail-header-left">
                <i class="fa-solid fa-bolt"></i>
                <span class="rail-activity-text">Activity</span>
            </div>
            <button type="button" class="rail-dock-toggle" id="rail-dock-toggle" title="Dock rail" aria-label="Dock rail">
                <i class="fa-regular fa-square-caret-right"></i>
            </button>
        </div>
    </div>

    <div class="rail-section">
        <ul class="run-list" id="run-list">
            <!-- Completed chat -->
            <li class="run-item">
                <a href="/home?section=Assistant">
                    <span class="run-left">
                        <i class="fa-solid fa-pen-to-square" title="Chat" style="color: black;"></i>
                        <span class="run-title truncate" title="New chat">
                            New chat
                        </span>
                    </span>
                </a>
            </li>
            <li style="height: 5px;"></li>



        </ul>
    </div>
</div>

<!-- Your existing rail markup goes here (as in your question) -->

<script>
    // Injected from server
    const activity_items = {{ activities | tojson | safe }};
    console.log("Loaded activity items:", activity_items);
    window.__initialActivityCursor = activity_items.length > 0 ? activity_items[0].id : null;


    // Icon map by type
    const TYPE_ICON = {
        conversation: { cls: "fa-comments", title: "Chat" },
        search_set_run: { cls: "fa-list-check", title: "Task" },
        workflow_run: { cls: "fa-diagram-project", title: "Workflow" },
    };

    // Right-side status icon (only show on interesting states)
    const STATUS_ICON = {
        queued: { cls: "fa-clock", label: "Queued" },
        running: { cls: "fa-gear fa-spin", label: "Running" },
        failed: { cls: "fa-triangle-exclamation", label: "Failed" },
        canceled: { cls: "fa-circle-minus", label: "Canceled" },
        completed: { cls: "fa-circle-check", label: "Completed" },
    };

    function safeTitle(a) {
        // Don't show fallback title - wait for auto-generated title
        // Only workflows get fallback since they don't have auto-generated titles
        if (a.title && a.title.trim().length) {
            return a.title;
        }
        if (a.type === "workflow_run") {
            return a.workflow?.name || "Workflow";
        }
        // Return empty string for chat/extraction until title is generated
        return "";
    }

    function resolveActivityId(activity) {
        if (!activity) return null;
        if (typeof activity.id === "string" && activity.id.length) {
            return activity.id;
        }
        const rawId = activity._id;
        if (!rawId) return null;
        if (typeof rawId === "string" && rawId.length) {
            return rawId;
        }
        if (typeof rawId === "object" && rawId !== null && typeof rawId.$oid === "string") {
            return rawId.$oid;
        }
        return null;
    }

    function liForActivity(a) {
        if (!a) return;
        const activityId = resolveActivityId(a);
        if (!activityId) {
            console.warn("Skipping activity with missing id", a);
            return;
        }
        console.log("Creating li for activity:", a, activityId);
        const isProgress = a.status === "running" || a.status === "queued";
        const isRunning = a.status === "running";
        const typeIcon = TYPE_ICON[a.type]?.cls || "fa-bolt";
        const isAutomationRun =
            a.type === "search_set_run" || a.type === "workflow_run";
        const status =
            a.status === "failed"
                ? STATUS_ICON.failed
                : a.status === "canceled"
                    ? STATUS_ICON.canceled
                    : null;
        // active activity is the one that has the same activity_id as in the url 
        const url_activity_id = new URLSearchParams(window.location.search).get('activity_id');
        let active_activity = url_activity_id === activityId;

        // Title tooltip can include error on failure
        const tooltip = a.status === "failed" && a.error
            ? `${safeTitle(a)} — Error: ${a.error}`
            : safeTitle(a);

        // Build left and (optional) right content
        const right =
            status
                ? `<span class="run-right"><i class="fa-solid ${status.cls} run-state-icon" aria-label="${status.label}"></i></span>`
                : "";

        const li = document.createElement("li");
        // Only add is-running class to automation runs (tasks/workflows), not chats
        let classes = `run-item${isProgress && isAutomationRun ? " is-running" : ""}`;
        classes += active_activity ? " active" : "";
        li.className = classes;
        li.dataset.runId = activityId;
        li.onclick = () => openRun(activityId, a);

        // add delete button for deleting the activity
        const displayTitle = safeTitle(a);
        const isLoadingTitle = !displayTitle && (a.type === "conversation" || a.type === "search_set_run");
        const loadingText = isLoadingTitle ? '<span class="title-loading" style="opacity: 0.5; font-style: italic;">Generating title...</span>' : displayTitle;
        li.innerHTML = `
      <span class="run-left">
        <i class="fa-solid ${typeIcon} run-type-icon" title="${displayTitle || (isLoadingTitle ? "Generating title..." : TYPE_ICON[a.type]?.title || "Activity")}"></i>
        <span class="run-title truncate" title="${tooltip}">${loadingText}</span>
        
      </span>
      <span class="run-actions">
        ${right}
        <button type="button" class="run-delete" onclick="deleteActivity(event, '${activityId}')" title="Delete activity" aria-label="Delete activity">
          <i class="fa-solid fa-trash"></i>
        </button>
      </span>
    `;
        return li;
    }



    // Simple handler you can expand to route appropriately
    function openRun(id, a) {
        if (!id || !a) {
            return;
        }
        const url = new URL(window.location.origin + "/home");
        url.searchParams.set("activity_id", id);

        switch (a.type) {
            case "conversation":
                url.searchParams.set("section", "Assistant");
                break;
            case "search_set_run":
                url.searchParams.set("section", "Library");
                if (a.search_set_uuid) {
                    url.searchParams.set("search_set_uuid", a.search_set_uuid);
                }
                break;
            case "workflow_run":
                url.searchParams.set("section", "Library");
                if (a.workflow_id) {
                    url.searchParams.set("workflow_id", a.workflow_id);
                }
                break;
            default:
                url.searchParams.set("section", "Assistant");
                break;
        }

        window.location.href = url.toString();
    }

    function deleteActivity(event, itemId) {
        event.stopPropagation(); // Prevent the click from propagating to the li element

        if (!confirm("Are you sure you want to delete this activity?")) {
            return;
        }

        fetch(`/activity/runs/delete/${encodeURIComponent(itemId)}`, {
            method: 'POST',
        }).then(response => {
            if (response.ok) {
                // Remove the item from the UI
                const li = document.querySelector(`li.run-item[data-run-id='${itemId}']`);
                if (li) {
                    li.remove();
                    // Preserve existing URL parameters
                    const url = new URL(window.location.href);
                    url.searchParams.set('section', 'Assistant');
                    url.searchParams.delete('activity_id'); // Remove the deleted activity ID
                    window.location.href = url.toString();
                }
            } else {
                alert("Failed to delete activity.");
            }
        }).catch(error => {
            console.error('Error deleting activity:', error);
            alert("Error deleting activity.");
        });

    }


    // Render initial activities from server on page load
    function renderInitialActivities() {
        const ul = document.getElementById("run-list");
        if (!ul) return;

        // Clear existing activities (keep "New chat" and spacer)
        while (ul.children.length > 2) {
            ul.removeChild(ul.lastChild);
        }

        // Render initial activities from server - these come from /home route
        if (Array.isArray(activity_items) && activity_items.length > 0) {
            activity_items.forEach(activity => {
                const li = liForActivity(activity);
                if (li) ul.appendChild(li);
            });
        }
    }

    // Initial render on page load - render activities immediately
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderInitialActivities);
    } else {
        renderInitialActivities();
    }
    
    // Make functions available globally for polling updates
    if (typeof window !== 'undefined') {
        window.liForActivity = liForActivity;
        window.resolveActivityId = resolveActivityId;
    }

    // Dock/undock functionality
    const rail = document.getElementById('app-rail');
    const railToggle = document.getElementById('rail-dock-toggle');
    const railToggleIcon = railToggle.querySelector('i');

    // Helper to apply CSS variable for rail width
    const setRailVar = (px) => document.documentElement.style.setProperty('--rail-w', px);

    // Restore rail docked state from localStorage
    const isDocked = localStorage.getItem('railDocked') === '1';
    if (isDocked) {
        rail.classList.add('docked');
        setRailVar('64px');
        railToggle.title = 'Undock rail';
        railToggle.setAttribute('aria-label', 'Undock rail');
        railToggleIcon.className = 'fa-regular fa-square-caret-left';
    } else {
        rail.classList.remove('docked');
        setRailVar('220px');
        railToggle.title = 'Dock rail';
        railToggle.setAttribute('aria-label', 'Dock rail');
        railToggleIcon.className = 'fa-regular fa-square-caret-right';
    }

    // Note: Panel resizer position is now set in index_scripts.html during initialization

    // Toggle dock/undock on button click
    railToggle.addEventListener('click', () => {
        const willBeDocked = !rail.classList.contains('docked');
        rail.classList.toggle('docked', willBeDocked);
        setRailVar(willBeDocked ? '64px' : '220px');
        localStorage.setItem('railDocked', willBeDocked ? '1' : '0');

        // Update button title, aria-label, and icon
        if (willBeDocked) {
            railToggle.title = 'Undock rail';
            railToggle.setAttribute('aria-label', 'Undock rail');
            railToggleIcon.className = 'fa-regular fa-square-caret-left';
        } else {
            railToggle.title = 'Dock rail';
            railToggle.setAttribute('aria-label', 'Dock rail');
            railToggleIcon.className = 'fa-regular fa-square-caret-right';
        }

        // Update panel resizer position immediately based on saved percentages
        // This allows the resizer to smoothly transition along with the panels
        if (typeof window.updatePanelResizerPositionFromPercentages === 'function') {
            requestAnimationFrame(() => {
                window.updatePanelResizerPositionFromPercentages();
            });
        }
    });
</script>
