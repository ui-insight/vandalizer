    function updateDocumentSelections() {
        var checkedCheckboxes = $('.document-selector:checked');
        var totalDocs = 0;
        // var totalTokenCounts = 0;
        var uuids = [];

        for (var i = 0; i < checkedCheckboxes.length; i++) {
            let checkbox = checkedCheckboxes[i];
            if (checkbox.attributes['data-num-documents'] == undefined) {
                continue;
            }
            var numDocs = checkbox.attributes['data-num-documents'].value

            // totalTokenCounts += parseInt(checkbox.attributes['data-token-count'].value);

            if (checkbox.attributes['data-doc-uuid'] != undefined) {
                uuids.push(checkbox.attributes['data-doc-uuid'].value);
            }

            if (checkbox.attributes['data-doc-uuids'] != undefined) {
                let uuidList = checkbox.attributes['data-doc-uuids'].value;
                let array = JSON.parse(uuidList.replace(/'/g, '"'));
                uuids = uuids.concat(array);
            }
        }

        // Check for docid in the browser's current URL
        let currentUrl = window.location.href;
        if (currentUrl.includes('docid=')) {
            let urlParams = new URLSearchParams(currentUrl.split('?')[1]);
            let docid = urlParams.get('docid');
            if (docid) {
                uuids.push(docid);
            }
        }

        totalDocs += uuids.length;
        document_uuids = uuids;

        // filter user available models

        filterAvailableModels(uuids);

        console.log("CHECKING");
        var docContainer = $('.document-container');
        if (docContainer.length > 0) {
            var docUuid = docContainer.data('doc-uuid');
            var isProcessing = docContainer.data('processing');
            if (totalDocs > 0 && !isProcessingFile && !isProcessing) {
                getWorkflowRecommendations(uuids);
            }
        } else {
            console.log("CHECKING TOTAL DOCS");
            if (totalDocs > 0) {
                getWorkflowRecommendations(uuids);
            }
        }



        var contextLengthWarning = `
                                    <span class="token-warning">&#9888; <span class="tooltiptext">Token count exceeds max context length, an advanced model will be used instead.</span></span>
        `

        var counters = $('.doc-selected-counter')
        for (var i = 0; i < counters.length; i++) {
            if (totalDocs == 0) {
                counters[i].textContent = `Select documents to begin`;
            } else if (totalDocs == 1) {
                // counters[i].textContent = `${totalDocs} document selected (${totalTokenCounts} tokens)`;
                counters[i].textContent = `${totalDocs} document selected`;


            } else {
                // counters[i].textContent = `${totalDocs} documents selected (${totalTokenCounts} tokens)`;
                counters[i].textContent = `${totalDocs} documents selected`;
            }
            // if (totalTokenCounts > maxContextLength) {
            //     counters[i].innerHTML += contextLengthWarning;
            // }
        }
    }

    function updateStatusPanelForPolling(data) {
        console.log("Polling data for panel update:", data); // Debugging line
        docLoaderProgressHandler.show();
        let currentStage;
        if (!data.complete) {
            if (data.status === "layout" || data.status === "ocr") {
                currentStage = 0;
                docLoaderProgressHandler.showOCRMessage();
            }
            else if (data.status === "security") {
                currentStage = 1;                   // Security check
                docLoaderProgressHandler.showSecurityMessage();
            }
            else if (data.status === "readying") {
                currentStage = 2;                   // Preparing AI
                docLoaderProgressHandler.markCompleted();
            } else if (data.status === "completed") {
                docLoaderProgressHandler.markCompleted();
            }
            else currentStage = 0;                                                  // Default fallback
        } else {
            currentStage = 3; // Done!
            docLoaderProgressHandler.hide();
            // refresh the page to get the latest document
            window.location.reload();
        }

        if (currentStage != docLoaderProgressHandler.itemidentifier) {
            docLoaderProgressHandler.setProgress(5);
            docLoaderProgressHandler.itemidentifier = currentStage;
        } else {
            docLoaderProgressHandler.incrementProgress(5);
        }
    }

    function pollStatus(docUuid) {
        if (!pollingActive) return;

        console.log("Polling status for document ID:", docUuid); // Debugging line

        $.get('/files/poll_status', { docid: docUuid }, function (data) {
            updateStatusPanelForPolling(data);
            console.log("Polling status for document: ", data.status);

            if (data.complete) {

                // Processing is complete, update UI
                $('#loading-spinner').hide();
                $('#processing-indicator').hide();
                $('#raw-text-icon').show();
                isProcessingFile = false;


                if (processingFileOriginalText != "") {
                    $('.processing-file-text-question-holder').text(processingFileOriginalText);
                    $('.message-response').remove();
                    $('.message-you').remove();
                    beginChat(processingFileOriginalText);
                    processingFileOriginalText = "";
                }

                console.log("COMPLTED");

                documentData = {
                    id: docUuid,
                    title: "",
                    raw_text: data.raw_text
                };

                clearTimeout(pollTimeout);
                // wait for the animation to finish
                // setTimeout(function () {
                //     // Reset animation step index
                //     animationStepIndex = 0;
                //     // Reset the container to its initial state
                //     docLoaderProgressHandler.hide();
                //     // Refresh the page to get the latest document
                //     // window.location.reload();
                // }, 10000);

                var docContainer = $('.document-container');
                if (docContainer.length > 0) {
                    var docUuid = docContainer.data('doc-uuid');
                    var isProcessing = docContainer.data('processing');
                    // set processing to false
                    docContainer.data('processing', false); // Set processing
                }
                updateDocumentSelections();

                // No additional refresh needed per the requirement
            }

            else {
                // Still processing, poll again after 5 seconds
                pollTimeout = setTimeout(function () {
                    var docContainer = $('.document-container');
                    if (docContainer.length > 0) {
                        let docUuid = docContainer.data('doc-uuid');
                        pollStatus(docUuid);
                    };
                }, 5000);

                isProcessingFile = true;
            }
        });
    }


    $(document).ready(function () {

        if (docContainer.length > 0) {
            var docUuid = docContainer.data('doc-uuid');
            var isProcessing = docContainer.data('processing');

            if (isProcessing) {
                // Show loading indicators
                $('#loading-spinner').show();
                $('#processing-indicator').show();
                // Hide regular content
                $('#raw-text-icon').hide();

                // Start polling
                pollStatus(docUuid);
            } else {

                // refresh the page to get the latest document
            }
        }

        // call this function to refresh the document selection on load

        let pollTimer = setInterval(pollAllLoaders, POLL_INTERVAL);

            // find each loader still on the page
            $('#workflow-loader-doc').each(function () {
                let $loader = $(this);
                let uuid = $loader.data('doc-uuid');

                $.get("/files/poll_status", { docid: uuid })

                        updateStatusPanelForPolling(resp);

    function performWorkflowStatus(session_id, workflow_time) {

        $.ajax({
            url: `/workflows/workflow/status?session_id=${session_id}`,
            type: 'GET',
            dataType: 'json',
            success: function (data) {
                console.log(data);
                //const { steps_completed, total_steps, status } = data;
                let steps_completed = data.steps_completed;
                let total_steps = data.total_steps;
                let status = data.status;

                if (steps_completed >= total_steps) {
                    if (workflow_interval_id) {
                        stopSpinningJoe();
                        clearInterval(workflow_interval_id);
                    }
                }


                if (steps_completed == active_step) {
                    $('.workflow-step').removeClass('active');
                    $('.step-connector').removeClass('active');

                    $('.workflow-loader').hide();
                    // Add 'active' class to the nth $('.workflow-step') element (0-based index)
                    $('.workflow-step').eq(active_step + 1).addClass('active');
                    $('.workflow-step').eq(active_step + 1).find('.step-connector').addClass('active');
                    $('.workflow-loader').eq(active_step).fadeIn();
                    // $('.workflow-loader').eq(active_step-1).fadeIn();
                    active_step = steps_completed + 1;
                }

                // Update steps completed and time elapsed
                $('.workflow-output-attachment-info').html(`
                      <span>${steps_completed} / ${total_steps} steps completed</span>
                      <span><i> ${workflow_time} seconds elapsed</i></span>
                  `);

                // Check if the workflow is completed or has failed
                if (status === 'completed' || status === 'failed') {
                    console.log("Workflow completed or failed");
                    if (workflow_interval_id) {
                        clearInterval(workflow_interval_id);
                    }
                    if (status === 'failed') {
                        showToast("Workflow failed");
                    } else {
                        if (workflow_interval_id) {
                            clearInterval(workflow_interval_id);
                        }
                        showToast("Workflow completed");

                        // show the results

                        let workflow_response = data.output;
                        console.log("workflow response:", data.output);

                        if (Array.isArray(workflow_response) && workflow_response.length === 1 && typeof workflow_response[0] === 'string') {
                            // Just use the HTML string directly
                            workflow_response = workflow_response[0];
                        } else {
                            // Otherwise stringify the object
                            workflow_response = JSON.stringify(workflow_response, null, 2);
                        }
                        let outputText = workflow_response
                            .replace(/^```(html|json|markdown)?\s*|\s*```$/g, '');

                        // replace \",\" with <hr> in the html output
                        outputText = outputText.replace(/\",\"/g, '<hr>');

                        $('.workflow-output-section').show();
                        $('.workflow-output-buttons').removeClass('hidden');
                        $('.workflow-output-section').append(`${outputText}`);
                        $('.workflow-container').animate({ scrollTop: $('.workflow-container')[0].scrollHeight }, 'slow');
                        $('.workflow-step').removeClass('active');
                        // Add 'active' class to the nth $('.workflow-step') element (0-based index)
                        $('.workflow-output').addClass('active');
                        $('.workflow-output').find('.step-connector').addClass('active');
                        $('.workflow-loader').hide();
                        // performWorkflowStatus(session_id, workflow_elapsed_time);
                        // stopSpinningJoe();

                    }

                    $('.workflow-step').eq(active_step).find('.step-connector').removeClass('active');
                    $('.workflow-loader').hide();
                    $('.workflow-step').eq(active_step).removeClass('active');
                    $('.workflow-output').addClass('active');
                }
            },
            error: function (xhr, ajaxOptions, thrownError) {
                stopSpinningJoe();
                clearInterval(intervalId); // Stop polling on error
                console.log(xhr.status);
                console.log(thrownError);
                showToast("Error polling workflow status");
            }
        });
    }

    function downloadWorkflow(session_id) {
        window.location.href = `/workflows/download?session_id=${session_id}`;
    }

    function pollWorkflowStatus(session_id) {
        let startTime = Date.now(); // Capture start time to calculate elapsed time
        const pollInterval = 1000; // Poll every second
        const maxAttempts = 180; // Optional: Stop polling after 60 seconds to prevent infinite loop
        workflow_elapsed_time = 0;

        let intervalId = setInterval(() => {
            workflow_elapsed_time += 1;

            performWorkflowStatus(session_id, workflow_elapsed_time);

            // Stop polling after max attempts
            if (workflow_elapsed_time >= maxAttempts) {
                stopSpinningJoe();
                clearInterval(intervalId);
                showToast("Workflow status polling timed out");
            }
        }, pollInterval);

        return intervalId;
    }
