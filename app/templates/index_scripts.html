    function clearRailActiveState() {
        document.querySelectorAll("#run-list li.run-item.active").forEach(function (li) {
            li.classList.remove("active");
        });
    }

    function promoteActivityInRail(activityId) {
        const ul = document.getElementById("run-list");
        if (!ul || !activityId) {
            return null;
        }
        const li = ul.querySelector(`li.run-item[data-run-id='${activityId}']`);
        if (!li) {
            return null;
        }
        if (ul.children.length > 2) {
            ul.insertBefore(li, ul.children[2]);
        } else {
            ul.appendChild(li);
        }
        return li;
    }

    function setActiveRailActivity(activityId, options) {
        if (!activityId) {
            return;
        }

        const opts = Object.assign({ promote: false, running: false }, options || {});
        const ul = document.getElementById("run-list");
        if (!ul) {
            return;
        }

        clearRailActiveState();

        const apply = function () {
            let li;
            if (opts.promote) {
                li = promoteActivityInRail(activityId);
            }
            if (!li) {
                li = ul.querySelector(`li.run-item[data-run-id='${activityId}']`);
            }
            if (!li) {
                pendingActivityActivation = { activityId: activityId, options: opts };
                return;
            }

            clearRailActiveState();
            li.classList.add("active");
            if (opts.running) {
                li.classList.add("is-running");
            }
            pendingActivityActivation = null;
        };

        const existing = ul.querySelector(`li.run-item[data-run-id='${activityId}']`);
        if (existing) {
            apply();
            return;
        }

        pendingActivityActivation = { activityId: activityId, options: opts };
    }

    function fulfillPendingActivityActivation() {
        if (!pendingActivityActivation) {
            return;
        }
        const ul = document.getElementById("run-list");
        if (!ul) {
            return;
        }
        const candidate = ul.querySelector(`li.run-item[data-run-id='${pendingActivityActivation.activityId}']`);
        if (candidate) {
            const opts = pendingActivityActivation.options || {};
            pendingActivityActivation = null;
            setActiveRailActivity(candidate.dataset.runId, opts);
        }
    }

    function toHtml(markdown) {
        const outputText = markdown.replace(/^```(html|json|markdown)?\s*|\s*```$/g, '');
        let rawText = window.marked.parse(outputText, {
            gfm: true,
            breaks: false,
        });
        return rawText;
    }

    function hasWorkflowOutput(snapshot) {
        if (!snapshot || typeof snapshot !== "object") {
            return false;
        }
        if (snapshot.output || snapshot.final_output || snapshot.finalOutput) {
            return true;
        }
        if (Array.isArray(snapshot.history) && snapshot.history.length > 0) {
            return snapshot.history.some((step) => step && step.output);
        }
        return false;
    }

    function normalizeWorkflowOutput(response) {
        if (response == null) {
            return null;
        }

        let content = response;

        if (Array.isArray(content)) {
            if (content.length === 1 && typeof content[0] === "string") {
                content = content[0];
            } else {
                content = JSON.stringify(content, null, 2);
            }
        } else if (typeof content === "object") {
            try {
                content = JSON.stringify(content, null, 2);
            } catch (err) {
                console.warn("Unable to serialize workflow output, falling back to string", err);
                content = String(content);
            }
        }

        if (typeof content !== "string") {
            return null;
        }

        const outputText = content.replace(/^```(html|json|markdown)?\s*|\s*```$/g, "").trim();
        return window.marked.parse(outputText, {
            gfm: true,
            breaks: true,
        });
    }

    function hydrateWorkflowSnapshot(snapshot) {
        if (!hasWorkflowOutput(snapshot)) {
            return;
        }

        const $outputContainer = $(".workflow-output");
        if ($outputContainer.length === 0) {
            return;
        }

        if (workflowActivityId) {
            $(".add-step").hide();
        }

        const $outputSection = $(".workflow-output-section");
        if ($outputSection.length === 0) {
            return;
        }

        const response =
            snapshot.output ??
            snapshot.final_output ??
            snapshot.finalOutput ??
            (() => {
                if (Array.isArray(snapshot.history) && snapshot.history.length > 0) {
                    const lastStep = [...snapshot.history].reverse().find((step) => step && step.output);
                    return lastStep ? lastStep.output : null;
                }
                return null;
            })();

        const html = normalizeWorkflowOutput(response);
        if (!html) {
            return;
        }

        if (snapshot.session_id) {
            workflow_session_id = snapshot.session_id;
        }

        $outputContainer.removeClass("hidden").addClass("active");
        $outputContainer.find(".step-connector").addClass("active");
        $(".workflow-loader").hide();

        $outputSection.show().empty().append(html);
        configureWorkflowDownloadButton();
        $(".workflow-output-buttons").removeClass("hidden");

        const stepsCompleted =
            snapshot.steps_completed ?? snapshot.stepsCompleted ?? snapshot.num_steps_completed;
        const stepsTotal = snapshot.steps_total ?? snapshot.stepsTotal ?? snapshot.num_steps_total;
        const status = snapshot.status ?? workflowActivityStatus;

        const info = $outputContainer.find(".workflow-output-attachment-info");
        if (info.length) {
            if (typeof stepsCompleted === "number" && typeof stepsTotal === "number" && stepsTotal >= 0) {
                const completed = Math.max(stepsCompleted, 0);
                let statusLabel = status || "Completed";
                if (typeof statusLabel === "string" && statusLabel.length > 0) {
                    statusLabel = statusLabel.charAt(0).toUpperCase() + statusLabel.slice(1);
                }
                info.html(`<span>${completed} / ${stepsTotal} steps completed</span><span><i>${statusLabel}</i></span>`);
            } else if (status) {
                const label = status.charAt(0).toUpperCase() + status.slice(1);
                info.html(`<span>${label}</span>`);
            } else {
                info.html(`<span>Workflow complete</span>`);
            }
        }
    }

    function createDocumentAttachment(attachment) {
        const content_preview = attachment.content ? attachment.content.slice(0, 500) : '';

        const preview = `<div style="font-size: 0.85em; color: #666; margin-top: 5px; padding: 5px; background: white; border-radius: 3px; max-height: 60px; overflow: hidden;">${escapeHtml(content_preview)}</div>`;
        const content_length = attachment.content.length;

        return `
        <div class="system-message" style="padding: 10px; margin: 10px 0; background: #f0f0f0; border-radius: 5px;">
            <i class="fa fa-file"></i> Added document: <strong>${attachment.filename}</strong>
            <button class="btn btn-sm btn-link" onclick="removeChatAttachment('${attachment.id}', this)" 
                    style="float: right; padding: 0; color: #999;" title="Remove">
                <i class="fa fa-times"></i>
            </button>
            <div style="font-size: 0.9em; color: #666; margin-top: 5px;">
                Content loaded (${content_length} chars)
            </div>
            ${preview}
        </div>
     `
    }

    function createUrlAttachment(attachment) {
        const link = attachment.url;
        // limited to first 500 characters
        const content_preview = attachment.content ? attachment.content.slice(0, 500) : '';
        return `

        <div class="system-message" style="padding: 10px; margin: 10px 0; background: #f0f0f0; border-radius: 5px;">
            <i class="fa fa-link"></i> Added link: <a href="${link}" target="_blank">${attachment.title || link}</a>
            <div style="font-size: 0.9em; color: #666; margin-top: 5px;">
                Content loaded (${content_preview ? content_preview.length + ' chars' : '0 chars'})
            </div>
        </div>
     `
    }

    /**
     * Remove attachment from chat
     */
    async function removeChatAttachment(attachmentId, buttonElement) {
        if (!confirm('Remove this attachment?')) return;

        try {
            const response = await fetch(`/chat/remove_document/${attachmentId}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                // Remove from UI
                $(buttonElement).closest('.system-message').fadeOut(300, function () {
                    $(this).remove();
                });
                console.log('Attachment removed successfully');
            } else {
                alert('Failed to remove attachment. Please try again.');
            }
        } catch (error) {
            console.error('Error removing attachment:', error);
            alert('Error removing attachment. Please try again.');
        }
    }

    function setSection(sectionName) {
        $(".search-results-panel").hide();
        $(".tab-content").hide();
        $("#tasks-panel").hide();

        // Use the tabTitle variable as needed
        let href = window.location.href;
        const qs = new URLSearchParams(href.split("?")[1]);
        qs.delete("section");
        qs.append("section", sectionName);
        const newQs = qs.toString();
        const newhref = `/home?${newQs}`;
        window.history.pushState({}, "", newhref);

        const tabMenu = document.querySelector(".tab-menu");
        const tabMenuItems = tabMenu.querySelectorAll("li");

        tabMenuItems.forEach((item) => item.classList.remove("active"));
        const libraryShouldBeActive = sectionName == "Library" || sectionName == "Workflows";
        tabMenuItems.forEach((item) => {
            if (item.innerText === "Assistant") {
                if (sectionName == "Tasks" || sectionName == "Assistant") {
                    item.classList.add("active");
                }
            } else {
                if (libraryShouldBeActive) {
                    item.classList.add("active");
                }
            }
        });

        if (sectionName == "Assistant") {
            $("#chat-panel").show();
            $("#bottom-toolbar-chat").show();
        } else if (sectionName == "Workflows") {
            $("#workflows-panel").show();
            if ($("#search-results-panel").children().length > 0) {
                $("#search-results-panel").show();
            }
            if (window.__workflowSnapshot && workflowActivityId) {
                $(".add-step").hide();
            }
        }
        else if (sectionName == "Library") {
            $("#library-panel").show();
            // If the search-results-panel has content (like an extraction panel), show it
            if ($("#search-results-panel").children().length > 0) {
                $("#search-results-panel").show();
            }
        }

        cleanup();
    }

    function shouldFetchRecommendations() {
        // Only fetch recommendations if we're in the Assistant tab AND there's an active chat

        // Check if we're in the Assistant section by checking both URL and visible state
        const urlParams = new URLSearchParams(window.location.search);
        const urlSection = urlParams.get('section');

        // Also check if chat panel is visible (more reliable for direct file opens)
        const chatPanelVisible = $('#chat-panel').is(':visible');
        const isInAssistantTab = urlSection === 'Assistant' || chatPanelVisible;

        if (!isInAssistantTab) {
            return false;
        }

        // Check if there's an active chat conversation with messages
        // Either from initial page load (chatConversation) or from current session (conversationId)
        const hasInitialChat = chatConversation && chatConversation.messages && chatConversation.messages.length > 0;
        const hasActiveConversation = conversationId !== null;

        if (!hasInitialChat && !hasActiveConversation) {
            return false;
        }

        return true;
    }

    function getWorkflowRecommendations(uuids) {
        docLoaderProgressHandler.showRecommendationMessage();
        $.ajax({
            url: '/workflows/workflow/recommendations',

            contentType: 'application/json; charset=utf-8',
            data: JSON.stringify({ uuids, space: $('#current-space-id')[0].innerHTML, limit: 5 }),
            dataType: 'json',
            success: function (msg) {

                const recommendations = msg.templates;


                const are_documents_valid = msg.are_documents_valid;
                if (!are_documents_valid) {
                    docLoaderProgressHandler.showSecurityFailureMessage();
                } else {
                    docLoaderProgressHandler.fastHide();
                }

                // Update the UI with the recommendations
                $('#recommendations-panel').empty();
                if (recommendations && recommendations.length > 0) {
                    recommendations.forEach(rec => {
                        $('#recommendations-panel').append(`${rec}`);
                    });
                } else {
                    $('#recommendations-panel').append('<li>No recommendations available</li>');
                }

                $('#recommendation-task-card').on('click', function (e) {
                    e.preventDefault();
                    setSection("Library");
                    $("#newTaskModal").show();
                });

                $('#recommendation-create-workflow-card').on('click', function (e) {
                    e.preventDefault();
                    setSection("Library");
                    $("#newWorkflowModal").show();
                });

                $('.workflow-recommendation-item').off("click").on("click", function () {
                    let uuid = $(this).attr("data-uuid");
                    fetchWorkflow(uuid);
                });

                $('.extraction-recommendation-item').off("click").on("click", function () {
                    let uuid = $(this).attr("data-uuid");
                    console.log(uuid);
                    search_set_add_uuid = uuid;
                    updateSearchSetPanel(uuid);

                });
            },
            error: function (xhr, status, err) {
                console.error('Error fetching workflow recommendations:', status, err);
            }
        });
    }

                // Update the modal's data-context so it's in sync
                $('#model-modal').data('context', newModel);

                // find the model tag in the models array based on the current model
                const modelTag = models.find(model => model.name === newModel);

    function attemptDocumentLoad(path = null) {
        if (path) {
            documentPath = path;
        }
        if (!documentPath) {
            console.log("No document path available to load.");
            return;
        }

        // append /static/uploads/ to the document path if not already present
        if (!documentPath.startsWith('/static/uploads/')) {
            documentPath = '/static/uploads/' + documentPath;
        }

        const extension = documentPath.split('.').pop().toLowerCase();
        console.log("Attempting to load document:", documentPath, "with extension:", extension);

        $.ajax({
            url: documentPath,
            type: 'HEAD',
            success: function () {
                console.log("document file exists, loading: " + documentPath);
                renderDocument();
            },
            error: function (xhr, status, error) {
                console.error("Document file not ready yet:", status, error);
                // For DOCX files, the conversion might still be in progress
                // Check if we should retry
                var docContainer = $('.document-container');
                if (docContainer.length > 0) {
                    var docUuid = docContainer.data('doc-uuid');
                    console.log("Checking document processing status...");
                    // Start polling if not already active
                    if (!pollingActive) {
                        pollingActive = true;
                        pollStatus(docUuid);
                    }
                }
            }
        });
    }


    var pollTimeout = null;

    function updateStatusPanelForPolling(data) {
        console.log("Polling data for panel update:", data); // Debugging line
        docLoaderProgressHandler.show();
        if (!window.document_displayed && documentPath) {
            attemptDocumentLoad(data.path);
        }
        let currentStage;
        if (!data.complete) {
            if (data.status === "layout" || data.status === "ocr") {
                currentStage = 0;
                docLoaderProgressHandler.showOCRMessage();
            }
            else if (data.status === "security") {
                currentStage = 1;                   // Security check
                docLoaderProgressHandler.showSecurityMessage();
            }
            else if (data.status === "readying") {
                currentStage = 2;                   // Preparing AI
                docLoaderProgressHandler.markCompleted();
            } else if (data.status === "completed") {
                docLoaderProgressHandler.markCompleted();
            }
            else currentStage = 0;                                                  // Default fallback
        } else {
            currentStage = 3; // Done!
            docLoaderProgressHandler.hide();
            // refresh the page to get the latest document
            // window.location.reload();
        }

        if (currentStage != docLoaderProgressHandler.itemidentifier) {
            docLoaderProgressHandler.setProgress(5);
            docLoaderProgressHandler.itemidentifier = currentStage;
        } else {
            docLoaderProgressHandler.incrementProgress(5);
        }
    }

    function pollStatus(docUuid) {
        if (!pollingActive) return;

        console.log("Polling status for document ID:", docUuid); // Debugging line

        $.ajax({
            url: '/files/poll_status',
            method: 'GET',
            data: { docid: docUuid },
            success: function (data) {
                updateStatusPanelForPolling(data);
                console.log("Polling status for document: ", data.status);

                if (data.complete) {
                    // Processing is complete, update UI
                    $('#loading-spinner, #processing-indicator').hide();
                    $('#raw-text-icon').show();
                    isProcessingFile = false;

                    if (processingFileOriginalText) {
                        $('.processing-file-text-question-holder').text(processingFileOriginalText);
                        $('.message-response, .message-you').remove();
                        beginChat(processingFileOriginalText);
                        processingFileOriginalText = "";
                    }

                    console.log("COMPLETED");

                    documentData = {
                        id: docUuid,
                        title: "",
                        raw_text: data.raw_text
                    };

                    clearTimeout(pollTimeout);

                    const docContainer = $('.document-container');
                    if (docContainer.length) {
                        docContainer.data('processing', false);
                    }
                    updateDocumentSelections();
                } else {
                    // Still processing, poll again after 5 seconds
                    isProcessingFile = true;
                    pollTimeout = setTimeout(function () {
                        const dc = $('.document-container');
                        if (dc.length) {
                            pollStatus(dc.data('doc-uuid'));
                        }
                    }, 5000);
                }
            },
            error: function (xhr, status, error) {
                if (xhr.status === 404) {
                    // Document not found — stop polling and inform the user
                    console.error("Document not found (404):", docUuid);
                    clearTimeout(pollTimeout);
                    isProcessingFile = false;
                } else {
                    console.error("Error polling status:", status, error);
                    pollTimeout = setTimeout(() => pollStatus(docUuid), 10000);
                }
            }
        });
    }

    $(function () {
        // how often we poll (ms)
        const POLL_INTERVAL = 3000;

        // the timer ID so we can clear it
        let pollTimer = setInterval(pollAllLoaders, POLL_INTERVAL);

        function pollAllLoaders() {
            // find each loader still on the page
            $('#workflow-loader-doc').each(function () {
                let $loader = $(this);
                let uuid = $loader.data('doc-uuid');

                $.get("/files/poll_status", { docid: uuid })
                    .done(function (resp) {
                        updateStatusPanelForPolling(resp);

                        if (resp.complete) {
                            if (resp.valid == false) {
                                location.reload();
                            }

                            // remove the spinner
                            $loader.remove();

                            // if you want to show the raw-text icon in that row:
                            // find the corresponding row and un-hide your icon:
                            $loader
                                .closest('tr')
                                .find('.raw-text-icon')
                                .show();

                            // optionally: insert the text itself, etc.
                        }
                    })
                    .fail(function () {
                        console.error("poll for", uuid, "failed");
                    });
            });

            // if there are no more loaders, stop polling entirely
            if ($('#workflow-loader-doc').length === 0) {
                clearInterval(pollTimer);
            }
        }

    function performWorkflowStatus(session_id, workflow_time) {

        $.ajax({
            url: `/workflows/workflow/status?session_id=${session_id}`,
            type: 'GET',
            dataType: 'json',
            success: function (data) {
                if (data.session_id) {
                    workflow_session_id = data.session_id;
                }
                //const { steps_completed, total_steps, status } = data;
                let steps_completed = data.steps_completed;
                let total_steps = data.total_steps;
                let status = data.status;

                if (steps_completed >= total_steps) {
                    if (workflow_interval_id) {
                        stopSpinningJoe();
                        clearInterval(workflow_interval_id);
                        resetWorkflowButton();
                    }
                }


                if (steps_completed == active_step) {
                    $('.workflow-step').removeClass('active');
                    $('.step-connector').removeClass('active');

                    $('.workflow-loader').hide();
                    // Add 'active' class to the nth $('.workflow-step') element (0-based index)
                    $('.workflow-step').eq(active_step + 1).addClass('active');
                    $('.workflow-step').eq(active_step + 1).find('.step-connector').addClass('active');
                    $('.workflow-loader').eq(active_step).fadeIn();
                    // $('.workflow-loader').eq(active_step-1).fadeIn();
                    active_step = steps_completed + 1;
                }

                const minutes = Math.floor(workflow_time / 60);
                const seconds = workflow_time % 60;

                // Update steps completed and time elapsed
                $('.workflow-output-attachment-info').html(`
                      <span>${steps_completed} / ${total_steps} steps completed</span>
                      <span><i>${minutes}m ${seconds}s elapsed</i></span>
                  `);

                // Check if the workflow is completed or has failed
                if (status === 'completed' || status === 'failed') {
                    console.log("Workflow completed or failed");
                    if (workflow_interval_id) {
                        clearInterval(workflow_interval_id);
                    }

                    window.__workflowSnapshot = {
                        output: data.output ?? null,
                        steps_completed: steps_completed,
                        steps_total: total_steps,
                        status: status,
                        session_id: workflow_session_id,
                    };

                    // Update the activity in the side rail
                    const activityId = data.activity_id;
                    if (activityId) {
                        const activityItem = document.querySelector(`li.run-item[data-run-id='${activityId}']`);
                        if (activityItem) {
                            // Remove running class
                            activityItem.classList.remove('is-running');
                            // Remove the spinning gear icon
                            const runRight = activityItem.querySelector('.run-right');
                            if (runRight) {
                                if (status === 'completed') {
                                    runRight.remove();
                                } else if (status === 'failed') {
                                    // Replace with failed icon
                                    runRight.innerHTML = '<i class="fa-solid fa-triangle-exclamation run-state-icon" aria-label="Failed"></i>';
                                }
                            }
                        }
                    }

                    if (status === 'failed') {
                        showToast("Workflow failed");
                    } else {
                        if (workflow_interval_id) {
                            clearInterval(workflow_interval_id);
                        }
                        showToast("Workflow completed");
                        resetWorkflowButton();
                        // show the results

                        let workflow_response = data.output;
                        console.log("workflow response:", data.output);

                        if (Array.isArray(workflow_response) && workflow_response.length === 1 && typeof workflow_response[0] === 'string') {
                            // Just use the HTML string directly
                            workflow_response = workflow_response[0];
                        } else {
                            // Otherwise stringify the object
                            workflow_response = JSON.stringify(workflow_response, null, 2);
                        }
                        window.__workflowSnapshot = {
                            output: workflow_response,
                            steps_completed: steps_completed,
                            steps_total: total_steps,
                            status: status,
                            session_id: workflow_session_id,
                        };
                        // Clean up the text
                        let outputText = workflow_response
                            .replace(/^```(html|json|markdown)?\\s*|\\s*```$/g, '')
                            .trim();

                        outputText = window.marked.parse(outputText, {
                            gfm: true,
                            breaks: true,
                        });

                        $('.workflow-output-section').empty();
                        $('.workflow-output-section').show();
                        $('.workflow-output-buttons').removeClass('hidden');
                        $('.workflow-output-section').append(`${outputText}`);
                        $('.workflow-container').animate({ scrollTop: $('.workflow-container')[0].scrollHeight }, 'slow');
                        $('.workflow-step').removeClass('active');
                        // Add 'active' class to the nth $('.workflow-step') element (0-based index)
                        $('.workflow-output').addClass('active');
                        $('.workflow-output').find('.step-connector').addClass('active');
                        $('.workflow-loader').hide();
                        // performWorkflowStatus(session_id, workflow_elapsed_time);
                        // stopSpinningJoe();

                    }

                    $('.workflow-step').eq(active_step).find('.step-connector').removeClass('active');
                    $('.workflow-loader').hide();
                    $('.workflow-step').eq(active_step).removeClass('active');
                    $('.workflow-output').addClass('active');

                    configureWorkflowDownloadButton();
                }
            },
            error: function (xhr, ajaxOptions, thrownError) {
                stopSpinningJoe();
                if (typeof intervalId !== 'undefined' && intervalId !== null) {
                    clearInterval(intervalId); // Stop polling on error
                }
                console.log(xhr.status);
                console.log(thrownError);
                resetWorkflowButton();
                showToast("Error polling workflow status");
            }
        });
    }

    function showWorkflowDownloadMenu($btn) {
        const $popup = $('#download-popup-menu');

        }

        if ($popup.is(':visible')) {

        }

        $('body').append($popup);

        $popup.css({
            position: 'absolute',
            visibility: 'hidden',
            display: 'block'
        });

        const popupWidth = $popup.outerWidth();
        const popupHeight = $popup.outerHeight();
        const offset = $btn.offset();

        let left = offset.left;
        let top = offset.top - popupHeight - 10;

    function performExtraction(search_set_uuid) {

        if (document_uuids == null || document_uuids == "") {
            showToast("Please select a document");
            return;
        }

        if ($('#run-term-button').length > 0 && $('#run-term-button')[0].textContent == "RUNNING") {
            return
        }

        showScanning();
        showWorking();
        let data = JSON.stringify({
            search_set_uuid: search_set_uuid,
            document_uuids: document_uuids,
        });

        console.log(data);
        if ($('#run-term-button').length > 0) {
            $('#run-term-button')[0].textContent = "RUNNING";

        }
        $('#run-term-button').addClass('shimmer');

        $.ajax({
            url: "/tasks/begin_search",
            type: "POST",
            data: data,
            contentType: "application/json; charset=utf-8",
            dataType: "json",
            async: true,
            success: function (data) {
                console.log("Extraction task started!");
                console.log(data);

                if (data.status === "queued" && data.activity_id) {
                    // Mark task as running in app rail
                    setActiveRailActivity(data.activity_id, { promote: true, running: true });

                    // Update URL immediately
                    const url = new URL(window.location.href);
                    url.searchParams.set('section', "Library");
                    url.searchParams.set('search_set_uuid', search_set_uuid);
                    url.searchParams.set('activity_id', data.activity_id);
                    window.history.replaceState(null, '', url.toString());

                    // Show loading message
                    $("#search-results-panel").show();
                    $("#search-results-panel").html("<div style='padding: 40px 20px; text-align: center;'><div class='lds-grid'><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div><p style='margin-top: 20px; font-size: 16px; font-weight: 500; color: #333;'>Running extraction...</p></div>");

                    // Poll for completion
                    pollExtractionStatus(data.activity_id, search_set_uuid);
                } else {
                    hideWorking();
                    stopScanning();
                    showToast("Error starting extraction: " + (data.message || "Unknown error"));
                }
            },
            error: function (xhr, ajaxOptions, thrownError) {
                console.log(xhr.status);
                console.log(thrownError);
            },
        });
    }

    function performSearch(search_set_uuid, datatitle) {

            showWorking();
            let data = JSON.stringify({
                search_set_uuid: search_set_uuid,
                document_uuids: document_uuids,
            });

            console.log(data);

            $.ajax({
                url: "/tasks/begin_search",
                type: "POST",
                data: data,
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                async: true,
                success: function (data) {
                    console.log("Extraction task started!");
                    console.log(data);

                    if (data.status === "queued" && data.activity_id) {
                        // Mark task as running in app rail
                        const activityItem = document.querySelector(`li.run-item[data-run-id='${data.activity_id}']`);
                        if (activityItem) {
                            activityItem.classList.add('is-running');
                        }

                        // Update URL immediately
                        const url = new URL(window.location.href);
                        url.searchParams.set('activity_id', data.activity_id);
                        window.history.replaceState(null, '', url.toString());

                        // Show loading message
                        $("#search-results-panel").show();
                        $("#search-results-panel").html("<div style='padding: 40px 20px; text-align: center;'><div class='lds-grid'><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div><p style='margin-top: 20px; font-size: 16px; font-weight: 500; color: #333;'>Running extraction...</p></div>");

                        // Poll for completion
                        const search_set_uuid = data.search_set_uuid || new URLSearchParams(window.location.search).get('search_set_uuid');
                        pollExtractionStatus(data.activity_id, search_set_uuid);
                    } else {
                        hideWorking();
                        stopScanning();
                        showToast("Error starting extraction: " + (data.message || "Unknown error"));
                    }
                },
                error: function (xhr, ajaxOptions, thrownError) {
                    console.log(xhr.status);
                    console.log(thrownError);
                },
            });
        }
    }

    function pollExtractionStatus(activity_id, search_set_uuid) {
        let pollCount = 0;
        const maxPolls = 120; // 2 minutes max (120 * 1000ms)

        const intervalId = setInterval(function () {
            pollCount++;

            $.ajax({
                url: `/tasks/extraction_status/${activity_id}`,
                type: "GET",
                dataType: "json",
                success: function (response) {
                    console.log("Extraction status:", response.status);

                    if (response.status === "completed") {
                        clearInterval(intervalId);
                        hideWorking();
                        stopScanning();

                        // Mark task as complete in app rail
                        const activityItem = document.querySelector(`li.run-item[data-run-id='${activity_id}']`);
                        if (activityItem) {
                            activityItem.classList.remove('is-running');
                            const runRight = activityItem.querySelector('.run-right');
                            if (runRight) {
                                runRight.remove();
                            }
                        }

                        // Display results
                        $("#search-results-panel").empty();
                        $(response.template).hide().appendTo("#search-results-panel").fadeIn();
                        addResultListeners();
                        search_set_add_uuid = search_set_uuid;

                        if ($('#run-term-button').length > 0) {
                            $('#run-term-button')[0].textContent = "RUN";
                        }
                        $('#run-term-button').removeClass('shimmer');

                        showToast("Extraction completed!");

                    } else if (response.status === "failed") {
                        clearInterval(intervalId);
                        hideWorking();
                        stopScanning();

                        const activityItem = document.querySelector(`li.run-item[data-run-id='${activity_id}']`);
                        if (activityItem) {
                            activityItem.classList.remove('is-running');
                        }

                        $("#search-results-panel").html("<div style='padding: 20px; color: red;'>Extraction failed: " + (response.error || "Unknown error") + "</div>");

                        if ($('#run-term-button').length > 0) {
                            $('#run-term-button')[0].textContent = "RUN";
                        }
                        $('#run-term-button').removeClass('shimmer');

                        showToast("Extraction failed");
                    } else if (pollCount >= maxPolls) {
                        clearInterval(intervalId);
                        hideWorking();
                        stopScanning();
                        $("#search-results-panel").html("<div style='padding: 20px; color: orange;'>Extraction is taking longer than expected. Check back later.</div>");
                        showToast("Extraction timeout");
                    }
                    // Otherwise keep polling (status is "queued" or "running")
                },
                error: function (xhr, ajaxOptions, thrownError) {
                    console.log("Error polling extraction status:", xhr.status, thrownError);
                    if (pollCount >= 5) {
                        // After 5 failed attempts, give up
                        clearInterval(intervalId);
                        hideWorking();
                        stopScanning();
                        $("#search-results-panel").html("<div style='padding: 20px; color: red;'>Error checking extraction status</div>");
                    }
                }
            });
        }, 1000); // Poll every second
    }

    // --- Only the clearing/placeholder part changes inside performChat ---
    function performChat(
        document_uuids,
        question,
        folder_uuid,
        additional_context = "",
        display_question = ""
    ) {

        const current_activity_id = new URLSearchParams(window.location.search).get('activity_id');


        $('#recommendations-panel').empty();
        $("#send-chat-button").prop("disabled", true);
        $(".chat-card-container").hide();

        const questionToDisplay = display_question === "" ? question : display_question;

        $("#chat-panel").append("<p><div class='message-you'>" + questionToDisplay + "</div></p>");

        // Clear editor correctly and restore placeholder state
        $("#chatinput").empty().addClass("is-editor-empty");
        // keep placeholder text synced (optional if static)
        $("#chatinput").attr("data-placeholder", PLACEHOLDER);

        const responseId = "response-" + new Date().getTime();
        $("#chat-panel").append(
            `<p>
        <div class='message-response' id='${responseId}'>
          <div class='chat-loader' style='display: inline-block;'></div>
        </div>
      </p>`
        );

        $("#chat-panel").animate({ scrollTop: $("#chat-panel")[0].scrollHeight }, "slow");


        fetch("/home/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json; charset=utf-8" },
            body: JSON.stringify({
                document_uuids: document_uuids,
                message: question + "\n" + additional_context,
                activity_id: current_activity_id,
                current_space_id: current_space_id,
                folder_uuid: folder_uuid,
            }),
        })
            .then((response) => {
                if (!response.body) throw new Error("No response body");

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                let markdownBuffer = "";
                let thinkingBuffer = "";
                let questionText = question + " " + additional_context;
                let buffer = ""; // For handling partial JSON chunks

                $("#" + responseId).html(
                    `<div style='display: flex; flex-direction: column;'>
            <div class='thinking-panel' style='display: none; background: #f5f5f5; color: ffffff55; padding: 10px; border-radius: 5px; margin-bottom: 10px;'>
              <div class='thinking-header' style='cursor: pointer; font-weight: bold;'>
                <span class='thinking-toggle'>▶</span> Show Thinking
              </div>
              <div class='thinking-content' style='display: none; margin-top: 10px; font-family: monospace; white-space: pre-wrap;'></div>
            </div>
            <div style='display: flex;'>
              <div style='flex-grow: 1;'>
                <div class="chat-response-body" id="streamedResponse"></div>
              </div>
            </div>
          </div>`
                );

                // Thinking panel toggle
                $("#" + responseId + " .thinking-header").on("click", function () {
                    const $content = $(this).siblings(".thinking-content");
                    const $toggle = $(this).find(".thinking-toggle");
                    if ($content.is(":visible")) {
                        $content.hide();
                        $toggle.text("▶");
                    } else {
                        $content.show();
                        $toggle.text("▼");
                    }
                });

                function pump() {
                    return reader.read().then(({ done, value }) => {
                        if (done) {
                            const outputText = markdownBuffer
                                // remove an opening fence at the very start
                                .replace(/^\s*```(?:[a-z0-9_-]+)?[^\n]*\n?/, '')
                                // remove a closing fence at the very end
                                .replace(/```[ \t]*$/, '');
                            let $responseDiv = $("<div>")
                                .addClass("message-response-body")
                                .attr({
                                    "data-question": questionText,
                                    "data-answer": markdownBuffer,
                                    "data-thinking": thinkingBuffer,
                                    "data-context": "",
                                    "data-document-uuids": document_uuids.join(","),
                                })
                                .html(window.marked.parse(outputText))
                                .append(createFeedbackButtons());

                            $("#" + responseId + " .chat-response-body").replaceWith($responseDiv);

                            if (isScrolledToBottom($("#chat-panel")[0])) {
                                $("#chat-panel").animate({ scrollTop: $("#chat-panel")[0].scrollHeight }, "fast");
                            }

                            // Note: Copy and download button handlers are handled by delegated event handlers
                            // Update URL with activity_id if not present (without page reload)
                            const currentUrl = new URL(window.location.href);
                            const hasActivityId = currentUrl.searchParams.has('activity_id');
                            console.log("message finished activity_id", activity_id);
                            if (!hasActivityId && activity_id) {
                                currentUrl.searchParams.set('activity_id', activity_id);
                                currentUrl.searchParams.set('section', 'Assistant');
                                window.history.replaceState({}, '', currentUrl);
                            }

                            return;
                        }

                        let chunk = decoder.decode(value, { stream: true });
                        buffer += chunk;

                        // Process complete JSON lines
                        let lines = buffer.split("\n");
                        buffer = lines.pop(); // Keep incomplete line in buffer

                        for (let line of lines) {
                            if (line.trim()) {
                                try {
                                    let data = JSON.parse(line);

                                    if (data.kind === "text") {
                                        markdownBuffer += data.content;
                                        const outputText = markdownBuffer
                                            // remove an opening fence at the very start
                                            .replace(/^\s*```(?:[a-z0-9_-]+)?[^\n]*\n?/, '')
                                            // remove a closing fence at the very end
                                            .replace(/```[ \t]*$/, '');
                                        const markdownContent = window.marked.parse(outputText);
                                        $("#streamedResponse").html(markdownContent);
                                    } else if (data.kind === "thinking") {
                                        thinkingBuffer += data.content;
                                        const $thinkingPanel = $("#" + responseId + " .thinking-panel");
                                        $thinkingPanel.show();
                                        $thinkingPanel.find(".thinking-content").text(thinkingBuffer);
                                    } else if (data.kind === "meta" && data.conversation_uuid) {
                                        conversationId = data.conversation_uuid;
                                    }
                                } catch (e) {
                                    console.error("Error parsing JSON:", e, "Line:", line);
                                }
                            }
                        }

                        return pump();
                    });
                }
                return pump();
            })
            .catch((error) => {
                console.log("Stream error", error);
            });
    }

    function copyRichTextToClipboard(html) {
        // Create a temporary element
        const container = document.createElement('div');
        container.innerHTML = html;

        // Try to use the modern clipboard API first
        try {
            // For plain text fallback
            const textContent = container.textContent || container.innerText;

            // Try to copy as HTML if supported
            if (navigator.clipboard && navigator.clipboard.write) {
                const blob = new Blob([html], { type: 'text/html' });
                const clipboardItem = new ClipboardItem({ 'text/html': blob });
                return navigator.clipboard.write([clipboardItem]).then(() => {
                    console.log('Rich text copied');
                    showToast("Copied to clipboard");
                })
                    .catch(err => {
                        console.warn('Rich text copy failed, falling back to plain text', err);
                        return navigator.clipboard.writeText(textContent);
                    });
            } else {
                // Fall back to plain text
                return navigator.clipboard.writeText(textContent);
            }
        } catch (err) {
            console.warn('Modern clipboard API failed, using fallback', err);
            // Fallback for Safari and older browsers
            return new Promise((resolve, reject) => {
                const textarea = document.createElement('textarea');
                textarea.value = container.textContent || container.innerText;
                textarea.style.position = 'fixed';
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();

                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        resolve();
                    } else {
                        reject(new Error('execCommand failed'));
                    }
                } catch (err) {
                    reject(err);
                } finally {
                    document.body.removeChild(textarea);
                }
            });
        }
    }

    /** Chat-specific downloader that calls your /chat/download route */
    async function downloadChatOutput(fmt, html) {
        // Helper: parse filename from Content-Disposition (supports filename* and filename)
        function parseFilenameFromCD(cdHeader, fallback) {
            if (!cdHeader) return fallback;
            // Try RFC 5987: filename*=UTF-8''encoded-name
            let m = cdHeader.match(/filename\*\s*=\s*UTF-8''([^;]+)/i);
            if (m?.[1]) {
                try {
                    return decodeURIComponent(m[1]).replace(/^"+|"+$/g, "");
                } catch (_) { /* ignore */ }
            }
            // Try plain filename="name.ext" or filename=name.ext
            m = cdHeader.match(/filename\s*=\s*(?:"([^"]+)"|([^;]+))/i);
            const raw = (m?.[1] || m?.[2])?.trim();
            return raw ? raw.replace(/^"+|"+$/g, "") : fallback;
        }

        async function doJsonPost() {
            const url = `/home/chat/download?format=${encodeURIComponent(fmt)}`;
            return fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: html }),
            });
        }

        async function doLegacyPost() {
            // Legacy server path: content in query string (not ideal, but as fallback)
            const params = new URLSearchParams({ format: fmt, content: html });
            const url = `/home/chat/download?${params.toString()}`;
            return fetch(url, { method: 'POST' });
        }

        try {
            if (typeof showToast === 'function') showToast('Preparing download…');

            // Try preferred JSON POST first
            let resp = await doJsonPost();

            // If server rejects JSON (common: 400/404/405/415), fallback to legacy
            if (!resp.ok && [400, 404, 405, 415].includes(resp.status)) {
                resp = await doLegacyPost();
            }

            if (!resp.ok) {
                const text = await resp.text().catch(() => '');
                throw new Error(`Download failed (${resp.status}): ${text.slice(0, 200)}`);
            }

            const cd = resp.headers.get('Content-Disposition') || resp.headers.get('content-disposition');
            const defaultName = `chat_output.${fmt === 'pdf' ? 'pdf' : fmt === 'csv' ? 'csv' : 'txt'}`;
            const filename = parseFilenameFromCD(cd, defaultName);

            const blob = await resp.blob();
            const blobUrl = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);

            if (typeof showToast === 'function') showToast(`Downloading ${filename}`);
        } catch (err) {
            console.error('Download error:', err);
            if (typeof showToast === 'function') showToast('Download failed. Copying to clipboard instead…');
            try {
                await copyRichTextToClipboard?.(html);
                if (typeof showToast === 'function') showToast('Copied to clipboard.');
            } catch (copyErr) {
                console.error('Clipboard fallback failed:', copyErr);
                if (typeof showToast === 'function') showToast('Could not copy to clipboard.');
            }
        }
    }

    section = "{{ section }}"
    console.log("Section is: " + section)
    setSection(section);

    // Trigger recommendations check after section is set (important for direct file opens)
    // Use setTimeout to ensure DOM is fully updated after setSection
    setTimeout(function () {
        updateDocumentSelections();
    }, 100);

    if (window.__workflowSnapshot && hasWorkflowOutput(window.__workflowSnapshot)) {
        hydrateWorkflowSnapshot(window.__workflowSnapshot);
    }
</script>
