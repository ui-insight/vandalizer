    async function advanceStep(statusMessages = []) {
        if (animationStepIndex >= steps.length) return;

        animationInProgress = true;
        const { title, messages, duration } = steps[animationStepIndex];
        titleEl.textContent = title;
        messageEl.textContent = "";
        progressEl.style.width = "0%";

        let animationMessages = statusMessages.length > 0 ? statusMessages : messages;

        // Cycle through messages
        let msgIdx = 0;
        const msgInterval = setInterval(() => {
            messageEl.textContent = messages[msgIdx % animationMessages.length];
            msgIdx++;
        }, duration / animationMessages.length);

        // Animate fill
        await new Promise(res => {
            progressEl.style.transition = `width ${duration}ms linear`;
            requestAnimationFrame(() => {
                progressEl.style.width = "100%";
            });
            setTimeout(() => {
                clearInterval(msgInterval);
                res();
            }, duration);
        });

        // Fade out before next
        await new Promise(res => {
            container.classList.remove("fade-in");
            container.classList.add("fade-out");
            setTimeout(() => {
                container.classList.remove("fade-out");
                container.classList.add("fade-in");
                res();
            }, 500);
        });

        animationStepIndex++;

        // If at the last stage, fade out after 1s
        if (animationStepIndex === steps.length) {
            setTimeout(() => container.classList.add("fade-out"), 1000);
            animationInProgress = false;
        }
    }

    // Call to start the animations from step 0

        animationStepIndex = 0;

        root_container.classList.remove("fade-out");
        root_container.classList.add("fade-in");
        container.classList.remove('fade-out');
        container.classList.add("fade-in");

        advanceStep(); // Start first step (will progress as you call more advanceStep)
    }

            let docid = urlParams.get('docid');
            if (docid) {

    var pollTimeout = null;
    var pollingActive = true;
    function pollStatus(docUuid) {
        if (!pollingActive) return;

        $.get('/files/poll_status', { docid: docUuid }, function (data) {

            console.log("Polling status for document: ", data.status);
            updateStatusPanelForPolling(data);

            if (data.complete) {

                // Processing is complete, update UI
                $('#loading-spinner').hide();
                $('#processing-indicator').hide();
                $('#raw-text-icon').show();
                isProcessingFile = false;

                if (processingFileOriginalText != "") {
                    $('.processing-file-text-question-holder').text(processingFileOriginalText);
                    $('.message-response').remove();
                    $('.message-you').remove();
                    beginChat(processingFileOriginalText);
                    processingFileOriginalText = "";
                }

                updateDocumentSelections();

                documentData = {
                    id: docUuid,
                    title: "",
                    raw_text: data.raw_text
                };

                clearTimeout(pollTimeout);
                // wait for the animation to finish
                setTimeout(function () {
                    // Reset animation step index
                    animationStepIndex = 0;
                    // Reset the container to its initial state
                    docLoaderProgressHandler.hide();
                    // Refresh the page to get the latest document
                    window.location.reload();
                }, 10000);

                // No additional refresh needed per the requirement
            }

            else {
                // Still processing, poll again after 5 seconds
                pollTimeout = setTimeout(function () {
                    pollStatus(docUuid);
                }, 5000);

                isProcessingFile = true;
            }
        });
    }

    function updateStatusPanelForPolling(data) {
        console.log("Polling data for panel update:", data); // Debugging line
        docLoaderProgressHandler.show();
        let currentStage;
        if (!data.complete) {
            if (data.status === "layout" || data.status === "ocr") {
                currentStage = 0;
                docLoaderProgressHandler.setMessage('Preparing Document', 'Reading layout...');
            }
            else if (data.status === "security") {
                currentStage = 1;                   // Security check
                docLoaderProgressHandler.setMessage('Security Check', 'Checking for any sensitive data...');
            }
            else if (data.status === "readying") {
                currentStage = 2;                   // Preparing AI
                docLoaderProgressHandler.markCompleted();
            } else if (data.status === "completed") {
                docLoaderProgressHandler.markCompleted();
            }
            else currentStage = 0;                                                  // Default fallback
        } else {
            currentStage = 3; // Done!
            docLoaderProgressHandler.hide();
        }

        if (currentStage != docLoaderProgressHandler.itemidentifier) {
            docLoaderProgressHandler.setProgress(5);
            docLoaderProgressHandler.itemidentifier = currentStage;
        } else {
            docLoaderProgressHandler.incrementProgress(5);
        }
    }


    $(document).ready(function () {
        var docContainer = $('.document-container');

        // Stop polling when the user navigates away from the page
        window.addEventListener('beforeunload', function () {
            pollingActive = false;
            if (pollTimeout) {
                clearTimeout(pollTimeout);
            }
        });

        // Check if the document container exists (i.e., a document is loaded)
        if (docContainer.length > 0) {
            var docUuid = docContainer.data('doc-uuid');
            var isProcessing = docContainer.data('processing');

            if (isProcessing) {
                // Show loading indicators
                $('#loading-spinner').show();
                $('#processing-indicator').show();
                // Hide regular content
                $('#raw-text-icon').hide();
                docLoaderProgressHandler.show();
                docLoaderProgressHandler.setMessage('Preparing Document', 'Reading layout...');
                docLoaderProgressHandler.setProgress(5);

                // Start polling
                pollStatus(docUuid);
            } else {
                // Show regular content
                $('#raw-text-icon').show();
                // refresh the page to get the latest document
            }
        }

        });

        // Folder creation checks
        $("#add-folder-form").on("submit", function (event) {
            event.preventDefault(); // Intercept the submission

            var folderName = $("#add-folder-field").val().trim();
            if (!folderName) {
                showToast("Folder name cannot be empty");
                return;
            }

            var folderExists = false;
            // Adjust the selector as needed if your folder name is not directly in .folder span
            $(".folder span").each(function () {
                if ($(this).text().trim().toLowerCase() === folderName.toLowerCase()) {
                    folderExists = true;
                    return false; // Break out of the loop
                }
            });

            if (folderExists) {
                showToast("Folder already exists");
                return;
            }

            // If validation passes, remove the submit handler and submit the form
            $(this).off("submit").submit();
        });
    });

    $(function () {
        // how often we poll (ms)
        const POLL_INTERVAL = 3000;

        // the timer ID so we can clear it
        let pollTimer = setInterval(pollAllLoaders, POLL_INTERVAL);

        function pollAllLoaders() {
            // find each loader still on the page
            $('#workflow-loader-doc').each(function () {
                let $loader = $(this);
                let uuid = $loader.data('doc-uuid');

                $.get("/files/poll_status", { docid: uuid })
                    .done(function (resp) {
                        console.log(resp);
                        updateStatusPanelForPolling(resp);
                        if (resp.complete) {
                            if (resp.valid == false) {
                                location.reload();
                            }

                            // remove the spinner
                            $loader.remove();

                            // if you want to show the raw-text icon in that row:
                            // find the corresponding row and un-hide your icon:
                            $loader
                                .closest('tr')
                                .find('.raw-text-icon')
                                .show();

                            // optionally: insert the text itself, etc.
                        }
                    })
                    .fail(function () {
                        console.error("poll for", uuid, "failed");
                    });
            });

            // if there are no more loaders, stop polling entirely
            if ($('#workflow-loader-doc').length === 0) {
                clearInterval(pollTimer);
            }
        }
    });


</script>
