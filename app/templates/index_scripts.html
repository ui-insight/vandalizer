    function dismissReleasePanel() {
        // Set a cookie 'release_seen' to the current release version.
        var d = new Date();
        // Cookie will expire in 30 days.
        d.setTime(d.getTime() + (30 * 24 * 60 * 60 * 1000));
        var expires = "expires=" + d.toUTCString();
        document.cookie = "release_seen={{ current_release }}; " + expires + "; path=/";
        // Hide the release panel immediately.
        document.getElementById('release-panel').style.display = 'none';
    }

    function setSection(sectionName) {

        const newQs = qs.toString();
        const newhref = `/home?${newQs}`;
        window.history.pushState({}, "", newhref);

        const tabMenu = document.querySelector(".tab-menu");
        const tabMenuItems = tabMenu.querySelectorAll("li");

        tabMenuItems.forEach((item) => item.classList.remove("active"));
        tabMenuItems.forEach((item) => {

                }
            } else {

                    item.classList.add("active");
                }
            }
        });

        cleanup();
    }

    function updateDocumentSelections() {
        var checkedCheckboxes = $('.document-selector:checked');
        var totalDocs = 0;
        // var totalTokenCounts = 0;
        var uuids = [];

        for (var i = 0; i < checkedCheckboxes.length; i++) {
            let checkbox = checkedCheckboxes[i];
            if (checkbox.attributes['data-num-documents'] == undefined) {
                continue;
            }
            var numDocs = checkbox.attributes['data-num-documents'].value

            // totalTokenCounts += parseInt(checkbox.attributes['data-token-count'].value);

            if (checkbox.attributes['data-doc-uuid'] != undefined) {
                uuids.push(checkbox.attributes['data-doc-uuid'].value);
            }

            if (checkbox.attributes['data-doc-uuids'] != undefined) {
                let uuidList = checkbox.attributes['data-doc-uuids'].value;
                let array = JSON.parse(uuidList.replace(/'/g, '"'));
                uuids = uuids.concat(array);
            }
        }

        // Check for docid in the browser's current URL
        let currentUrl = window.location.href;
        if (currentUrl.includes('docid=')) {
            let urlParams = new URLSearchParams(currentUrl.split('?')[1]);
            let docid = urlParams.get('docid');
            if (docid) {
                uuids.push(docid);
            }
        }

        totalDocs += uuids.length;
        document_uuids = uuids;

        // filter user available models

        filterAvailableModels(uuids);

        console.log("CHECKING");
        var docContainer = $('.document-container');
        if (docContainer.length > 0) {
            var docUuid = docContainer.data('doc-uuid');
            var isProcessing = docContainer.data('processing');
            if (totalDocs > 0 && !isProcessingFile && !isProcessing) {
                getWorkflowRecommendations(uuids);
            }
        } else {
            console.log("CHECKING TOTAL DOCS");
            if (totalDocs > 0) {
                getWorkflowRecommendations(uuids);
            } else {
                $('#recommendations-panel').empty();
                docLoaderProgressHandler.show();
                docLoaderProgressHandler.showDefaultMessage();
            }
        }


        var contextLengthWarning = `
                                    <span class="token-warning">&#9888; <span class="tooltiptext">Token count exceeds max context length, an advanced model will be used instead.</span></span>
        `

        var counters = $('.doc-selected-counter')
        for (var i = 0; i < counters.length; i++) {
            if (totalDocs == 0) {
                counters[i].textContent = `Select documents to begin`;
            } else if (totalDocs == 1) {
                // counters[i].textContent = `${totalDocs} document selected (${totalTokenCounts} tokens)`;
                counters[i].textContent = `${totalDocs} document selected`;


            } else {
                // counters[i].textContent = `${totalDocs} documents selected (${totalTokenCounts} tokens)`;
                counters[i].textContent = `${totalDocs} documents selected`;
            }
            // if (totalTokenCounts > maxContextLength) {
            //     counters[i].innerHTML += contextLengthWarning;
            // }
        }
    }

    function displayDocument() {
        // First check if we have a document container indicating processing status
        var docContainer = $('.document-container');
        console.log("displayDocument called");
        if (docContainer.length > 0) {
            var docUuid = docContainer.data('doc-uuid');
            var isProcessing = docContainer.data('processing');

            if (isProcessing) {
                console.log("Document is still processing, waiting for completion...");
                // Don't attempt to load PDF yet - polling will handle this
                return;
            }
        }

        // Proceed with document loading
        attemptDocumentLoad();
    }


    function attemptDocumentLoad(path = null) {
        if (path) {
            documentPath = path;
        }
        if (!documentPath) {
            console.log("No document path available to load.");
            return;
        }

        // append /static/uploads/ to the document path if not already present
        if (!documentPath.startsWith('/static/uploads/')) {
            documentPath = '/static/uploads/' + documentPath;
        }

        const extension = documentPath.split('.').pop().toLowerCase();
        console.log("Attempting to load document:", documentPath, "with extension:", extension);

        $.ajax({
            url: documentPath,
            type: 'HEAD',
            success: function () {
                console.log("document file exists, loading: " + documentPath);
                renderDocument();
            },
            error: function (xhr, status, error) {
                console.error("Document file not ready yet:", status, error);
                // For DOCX files, the conversion might still be in progress
                // Check if we should retry
                var docContainer = $('.document-container');
                if (docContainer.length > 0) {
                    var docUuid = docContainer.data('doc-uuid');
                    console.log("Checking document processing status...");
                    // Start polling if not already active
                    if (!pollingActive) {
                        pollingActive = true;
                        pollStatus(docUuid);
                    }
                }
            }
        });
    }


    var pollTimeout = null;

    function updateStatusPanelForPolling(data) {
        console.log("Polling data for panel update:", data); // Debugging line
        docLoaderProgressHandler.show();
        if (!window.document_displayed && documentPath) {
            attemptDocumentLoad(data.path);
        }
        let currentStage;
        if (!data.complete) {
            if (data.status === "layout" || data.status === "ocr") {
                currentStage = 0;
                docLoaderProgressHandler.showOCRMessage();
            }
            else if (data.status === "security") {
                currentStage = 1;                   // Security check
                docLoaderProgressHandler.showSecurityMessage();
            }
            else if (data.status === "readying") {
                currentStage = 2;                   // Preparing AI
                docLoaderProgressHandler.markCompleted();
            } else if (data.status === "completed") {
                docLoaderProgressHandler.markCompleted();
            }
            else currentStage = 0;                                                  // Default fallback
        } else {
            currentStage = 3; // Done!
            docLoaderProgressHandler.hide();
            // refresh the page to get the latest document
            // window.location.reload();
        }

        if (currentStage != docLoaderProgressHandler.itemidentifier) {
            docLoaderProgressHandler.setProgress(5);
            docLoaderProgressHandler.itemidentifier = currentStage;
        } else {
            docLoaderProgressHandler.incrementProgress(5);
        }
    }

    function pollStatus(docUuid) {
        if (!pollingActive) return;

        console.log("Polling status for document ID:", docUuid); // Debugging line

        $.ajax({
            url: '/files/poll_status',
            method: 'GET',
            data: { docid: docUuid },
            success: function (data) {
                updateStatusPanelForPolling(data);
                console.log("Polling status for document: ", data.status);

                if (data.complete) {
                    // Processing is complete, update UI
                    $('#loading-spinner, #processing-indicator').hide();
                    $('#raw-text-icon').show();
                    isProcessingFile = false;

                    if (processingFileOriginalText) {
                        $('.processing-file-text-question-holder').text(processingFileOriginalText);
                        $('.message-response, .message-you').remove();
                        beginChat(processingFileOriginalText);
                        processingFileOriginalText = "";
                    }

                    console.log("COMPLETED");

                    documentData = {
                        id: docUuid,
                        title: "",
                        raw_text: data.raw_text
                    };

                    clearTimeout(pollTimeout);

                    const docContainer = $('.document-container');
                    if (docContainer.length) {
                        docContainer.data('processing', false);
                    }
                    updateDocumentSelections();
                } else {
                    // Still processing, poll again after 5 seconds
                    isProcessingFile = true;
                    pollTimeout = setTimeout(function () {
                        const dc = $('.document-container');
                        if (dc.length) {
                            pollStatus(dc.data('doc-uuid'));
                        }
                    }, 5000);
                }
            },
            error: function (xhr, status, error) {
                if (xhr.status === 404) {
                    // Document not found — stop polling and inform the user
                    console.error("Document not found (404):", docUuid);
                    clearTimeout(pollTimeout);
                    isProcessingFile = false;
                } else {
                    // Some other error — you can choose to retry or stop
                    console.error("Error polling status:", status, error);
                    // Example: retry once after 10 seconds
                    pollTimeout = setTimeout(() => pollStatus(docUuid), 10000);
                }
            }
        });
    }

    function performWorkflowStatus(session_id, workflow_time) {

        $.ajax({
            url: `/workflows/workflow/status?session_id=${session_id}`,
            type: 'GET',
            dataType: 'json',
            success: function (data) {
                //const { steps_completed, total_steps, status } = data;
                let steps_completed = data.steps_completed;
                let total_steps = data.total_steps;
                let status = data.status;

                if (steps_completed >= total_steps) {
                    if (workflow_interval_id) {
                        stopSpinningJoe();
                        clearInterval(workflow_interval_id);
                        resetWorkflowButton();
                    }
                }


                if (steps_completed == active_step) {
                    $('.workflow-step').removeClass('active');
                    $('.step-connector').removeClass('active');

                    $('.workflow-loader').hide();
                    // Add 'active' class to the nth $('.workflow-step') element (0-based index)
                    $('.workflow-step').eq(active_step + 1).addClass('active');
                    $('.workflow-step').eq(active_step + 1).find('.step-connector').addClass('active');
                    $('.workflow-loader').eq(active_step).fadeIn();
                    // $('.workflow-loader').eq(active_step-1).fadeIn();
                    active_step = steps_completed + 1;
                }

                const minutes = Math.floor(workflow_time / 60);
                const seconds = workflow_time % 60;

                // Update steps completed and time elapsed
                $('.workflow-output-attachment-info').html(`
                      <span>${steps_completed} / ${total_steps} steps completed</span>
                      <span><i>${minutes}m ${seconds}s elapsed</i></span>
                  `);

                // Check if the workflow is completed or has failed
                if (status === 'completed' || status === 'failed') {
                    console.log("Workflow completed or failed");
                    if (workflow_interval_id) {
                        clearInterval(workflow_interval_id);
                    }
                    if (status === 'failed') {
                        showToast("Workflow failed");
                    } else {
                        if (workflow_interval_id) {
                            clearInterval(workflow_interval_id);
                        }
                        showToast("Workflow completed");
                        resetWorkflowButton();
                        // show the results

                        let workflow_response = data.output;
                        console.log("workflow response:", data.output);

                        if (Array.isArray(workflow_response) && workflow_response.length === 1 && typeof workflow_response[0] === 'string') {
                            // Just use the HTML string directly
                            workflow_response = workflow_response[0];
                        } else {
                            // Otherwise stringify the object
                            workflow_response = JSON.stringify(workflow_response, null, 2);
                        }
                        // Clean up the text
                        let outputText = workflow_response
                            .replace(/^```(html|json|markdown)?\\s*|\\s*```$/g, '')
                            .trim();

                        outputText = window.marked.parse(outputText, {
                            gfm: true,
                            breaks: true,
                        });

                        $('.workflow-output-section').empty();
                        $('.workflow-output-section').show();
                        $('.workflow-output-buttons').removeClass('hidden');
                        $('.workflow-output-section').append(`${outputText}`);
                        $('.workflow-container').animate({ scrollTop: $('.workflow-container')[0].scrollHeight }, 'slow');
                        $('.workflow-step').removeClass('active');
                        // Add 'active' class to the nth $('.workflow-step') element (0-based index)
                        $('.workflow-output').addClass('active');
                        $('.workflow-output').find('.step-connector').addClass('active');
                        $('.workflow-loader').hide();
                        // performWorkflowStatus(session_id, workflow_elapsed_time);
                        // stopSpinningJoe();

                    }

                    $('.workflow-step').eq(active_step).find('.step-connector').removeClass('active');
                    $('.workflow-loader').hide();
                    $('.workflow-step').eq(active_step).removeClass('active');
                    $('.workflow-output').addClass('active');

                    $('#downloadWorkflowBtn').on('click', function (e) {
                        e.stopPropagation();
                        const $btn = $(this);
                        const $popup = $('#download-popup-menu');

                        // 1) move it so it's not clipped by any parent
                        $('body').append($popup);

                        // 2) show invisibly to get its dimensions
                        $popup.css({
                            position: 'absolute',
                            visibility: 'hidden',
                            display: 'block'
                        });
                        const popupW = $popup.outerWidth();
                        const popupH = $popup.outerHeight();

                        // 3) figure out where the button is on the page
                        const btnOff = $btn.offset();

                        // 4) calculate your top/left
                        let left = btnOff.left;               // align left edges
                        let top = btnOff.top - popupH - 10; // sit 10px above the button

                        // 5) keep it inside the viewport
                        const winW = $(window).width();
                        if (left + popupW > winW) left = winW - popupW - 5;

                        // 6) show it for real
                        $popup.css({
                            visibility: 'visible',
                            top: `${top}px`,
                            left: `${left}px`,
                            opacity: 0
                        }).animate({ opacity: 1 }, 200);


                        $('#download-pdf-option').off('click').on("click", function () {
                            console.log("here");
                            hideDownloadPopupMenu();
                            downloadWorkflowOutput('pdf');

                        });
                        $('#download-csv-option').off('click').on("click", function () {
                            hideDownloadPopupMenu();
                            downloadWorkflowOutput('csv');
                        });
                        $('#download-text-option').off('click').on("click", function () {
                            hideDownloadPopupMenu();
                            downloadWorkflowOutput('txt');
                        });
                    });
                }
            },
            error: function (xhr, ajaxOptions, thrownError) {
                stopSpinningJoe();
                if (typeof intervalId !== 'undefined' && intervalId !== null) {
                    clearInterval(intervalId); // Stop polling on error
                }
                console.log(xhr.status);
                console.log(thrownError);
                resetWorkflowButton();
                showToast("Error polling workflow status");
            }
        });

                $("#search-results-panel").empty();
                $(msg.template).hide().appendTo("#search-results-panel").fadeIn();
                addResultListeners();
            },
            error: function (xhr, ajaxOptions, thrownError) {
                console.log(xhr.status);
                console.log(thrownError);
            },
        });
    }

    $("#add-search-set-input").on("keyup", function (e) {
        if (e.key === "Enter") {
            $("#add-search-set-button").click();
        }
    });

    $("#add-search-set-button").on("click", function () {
        addSearchSet($("#add-search-set-input")[0].value, "extraction");
    });

    function addSearchSet(title, category) {
        $.ajax({
            url: "/tasks/extraction/add_search_set",
            type: "POST",
            data: JSON.stringify({
                title: title,
                space_id: "{{ current_space_id }}",
                search_type: category,
            }),
            contentType: "application/json; charset=utf-8",
            dataType: "json",
            async: true,
            success: function (msg) {
                search_set_add_uuid = msg.uuid;
                updateSearchSetPanel(msg.uuid);
            },
            error: function (xhr, ajaxOptions, thrownError) {
                console.log(xhr.status);
                console.log(thrownError);
            },
        });
    }

    $("#semantic-search-button").on("click", function (e) {
        e.preventDefault();
        performSemanticSearch($("#add-search-term-input")[0].value);
    });

    $("#next-semantic-button").on("click", function (e) {
        e.preventDefault();
        nextHighlight();
    });

    $(document).on("keyup", function (e) {
        if (e.key === "ArrowRight") {
            nextHighlight();
        }
    });

    function nextHighlight() {
        current_search_item += 1;
        if (current_search_item >= highlights.length) {
            current_search_item = 0;
        }

        updateHighlights();
    }

    $("#prev-semantic-button").on("click", function (e) {
        e.preventDefault();
        previousHighlight();
    });

    $(document).on("keyup", function (e) {
        if (e.key === "ArrowLeft") {
            previousHighlight();
        }
    });

    function previousHighlight() {
        current_search_item -= 1;
        if (current_search_item == -1) {
            current_search_item = highlights.length - 1;
        }

        updateHighlights();
    }

    function updateHighlights() {
        highlights = $(".highlight");

        highlights[current_search_item].scrollIntoView({
            behavior: "smooth",
            block: "center",
            inline: "nearest",
        });
        $("#semantic-panel-count").text(
            current_search_item + 1 + " of " + highlights.length,
        );
        for (var i = 0; i < highlights.length; i++) {
            highlights[i].style.backgroundColor = "yellow";
            highlights[i].style.opacity = 0.5;
        }

        highlights[current_search_item].style.backgroundColor = "red";
    }

    function getRating() {
        const ratingInputs = document.querySelectorAll('input[name="rate"]');
        let selectedValue;

        for (const input of ratingInputs) {
            if (input.checked) {
                selectedValue = input.value;
                break;
            }
        }

        return selectedValue;
    }

    function createSearchTermDictionary() {
        const searchTermDictionary = {};
        let searchItems = $(".set-result-items").children();
        searchItems.each(function () {
            const searchPhrase = $(this).find(".set-title").text().trim();
            const result = $(this).find(".extraction-result").text().trim();
            searchTermDictionary[searchPhrase] = result;
        });

        return searchTermDictionary;
    }
