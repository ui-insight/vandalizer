<div id="workflowEditStepModal" class="workflow-overlay" style="display: block;">
    <div class="workflow-modal-content">
        <h2 class="workflow-modal-header">
        {{ workflow_step.name }}
        <a id="closeWorkflowStepBtn" style="float:right; color: #88888899; cursor: pointer;"><i class="fa-solid fa-circle-xmark"></i></a>
        </h2>
        
        <!-- Description -->
        <hr>
        <h3 class="workflow-modal-subtitle">Build this step of the workflow</h3>
        <hr style="padding-bottom: 0px; margin-bottom: 0px;">

        <!-- Tabbed navigation -->
        <label class="workflow-label" style="padding: 15px 30px;">Basic Setup</label>

        <div class="workflow-content-body">
            
        </div>
        
        <div class="bottom-toolbar" style>
            <div>
                <!-- Action buttons -->
                
                <div style="padding: 0px; margin: 0 auto; display: flex; justify-content: center; gap: 15px;">
                    <button id="deletePromptToWorkflowBtn" class="btn btn-secondary" style="background-color: red; flex-grow: 1;">Delete Step</button>
                    <button id="confirmPromptStepBtn" class="btn btn-primary" style="flex-grow: 1;"></button>
                </div>
            </div>
        </div>        
    </div>
    
    <script>
        

        $('#closeAddPromptToWorkflowBtn').on("click", function (e) {
            e.preventDefault();  // Prevent default behavior, if needed
            $('#workflowAddPromptModal').remove();
        });

        $('#deletePromptToWorkflowBtn').on("click", function (e) {
            e.preventDefault();  // Prevent default behavior, if needed
            console.log("clicked");
            let data = JSON.stringify({
                workflow_step_id: "{{ workflow_step_id }}"
            });

            $.ajax({
                url: `/api/workflow/delete_step`,
                type: 'POST',
                data: data,
                contentType: 'application/json; charset=utf-8',
                dataType: 'json',
                async: true,
                success: function (data) {
                    location.reload();
                },
                error: function (xhr, ajaxOptions, thrownError) {
                    console.log(xhr.status);
                    console.log(thrownError);
                }
            });
        });
    </script>
</div>
