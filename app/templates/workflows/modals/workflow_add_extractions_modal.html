<div id="" class="workflow-overlay workflowAddExtractionsModal" style="display: block;">
    <div class="workflow-modal-content">
        <!-- Header -->
        <h2 class="workflow-modal-header">
            {% if is_editing %} Update Extractions {% else %} Add Extractions {% endif %}
            <a class="closeAddExtractionToWorkflowBtn" style="float:right; color: #88888899; cursor: pointer;"><i
                    class="fa-solid fa-circle-xmark"></i></a>
        </h2>

        <!-- Description -->
        <hr>
        <h3 class="workflow-modal-subtitle">Extract specific information from text using AI</h3>
        <hr style="padding-bottom: 0px; margin-bottom: 0px;">


        <!-- Body -->
        <div class="workflow-content-body">
            <!-- Tab content for dropdown selection -->
            <div class="workflow-tab-content" id="selectDropdown">
                <label class="workflow-label" style="padding-top: 10px;">Enter extractions (comma-separated):</label>
                <input type="text" id="extractionInput" placeholder="e.g., Name, Age, Location" class="input-field"
                    value="{{ workflow_task.data['searchphrases'] if is_editing else '' }}">
                <label class="workflow-label" style="padding-top: 10px;">From your saved
                    tasks:</label>
                <select id="extractionSetDropdown" class="workflow-input-field">
                    <option value="">Select a saved task...</option>
                    {% for prompt in extraction_sets %}
                    <option value="{{ prompt.id }}" data-prompt="{{ prompt.search_phrases_csv()|e }}" {% if is_editing
                        and 'search_set_item_id' in workflow_task.data and
                        workflow_task.data['search_set_item_id']==prompt.id %} selected {% endif %}>{{ prompt.title }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Bottom Toolbar -->
        <div class="bottom-toolbar" style>
            <div>
                <div style="padding: 0px; margin: 0 auto; display: flex; justify-content: center; gap: 15px;">
                    {% if is_editing %}
                    <button id="deleteExtractionToWorkflowBtn" class="btn btn-secondary" style="flex-grow: 1;">Test
                        Step</button>
                    {% endif %}

                    <button id="confirmExtractionStepBtn" class="btn btn-primary" style="flex-grow: 1;">
                        {% if is_editing %}
                        Update
                        {% else %}
                        Add Extractions
                        {% endif %}
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script>
        function openAddExtractionTab(tabName) {
            // Hide all tab content
            document.querySelectorAll('.workflow-tab-content').forEach(content => content.style.display = 'none');
            // Remove active class from all tab buttons
            document.querySelectorAll('.workflow-tab-btn').forEach(btn => btn.classList.remove('active'));
            // Show the selected tab content and mark the button as active
            document.getElementById(tabName).style.display = 'block';
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        $('.closeAddExtractionToWorkflowBtn').on("click", function (e) {
            e.preventDefault();  // Prevent default behavior, if needed
            $('.workflowAddExtractionsModal').remove();
        });

        // When the dropdown changes, load its data‐prompt into the textarea
        $('#extractionSetDropdown').on('change', function () {
            const selectedOption = $(this).find('option:selected');
            const promptText = selectedOption.data('prompt') || '';
            $('#extractionInput').val(promptText);
        });

        // If the user types/edits the textarea, reset the dropdown to the “no selection” option
        $('#extractionInput').on('input', function () {
            const dropdown = $('#extractionSetDropdown');
            if (dropdown.val()) {
                dropdown.val('');
            }
        });
    </script>
</div>
