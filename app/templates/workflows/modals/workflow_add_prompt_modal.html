<div id="workflowAddPromptModal" class="workflow-overlay" style="display: block;">
    <div class="workflow-modal-content">
        <h2 class="workflow-modal-header">
            {% if is_editing %}
            Update Prompt
            {% else %}
            Add Prompt
            {% endif %}
            <a id="closeAddPromptToWorkflowBtn" style="float:right; color: #88888899; cursor: pointer;"><i
                    class="fa-solid fa-circle-xmark"></i></a>
        </h2>

        <!-- Description -->
        <hr>
        <h3 class="workflow-modal-subtitle">Uses AI to perform your instructions on text</h3>
        <hr style="padding-bottom: 0px; margin-bottom: 0px;">

        <div class="workflow-content-body">
            <!-- Tab content for dropdown selection -->
            <div>
                <label class="workflow-label" style="padding-top: 10px;">Enter a
                    prompt:</label>
                <textarea id="promptInput" class="input-field"
                    placeholder="e.g., Summarize this for me into a todo list" rows="10"
                    value="{{ workflow_task.data['prompt'] if is_editing else '' }}">{{ workflow_task.data['prompt'] if is_editing else '' }}</textarea>
                <label class="workflow-label" style="padding-top: 10px;">From your saved
                    tasks:</label>
                <select id="extractionSetDropdown" class="workflow-input-field">
                    <option value="">Select a saved task...</option>
                    {% for prompt in prompts %}
                    <option value="{{ prompt.id }}" data-prompt="{{ prompt.searchphrase|e }}" {% if is_editing
                        and 'search_set_item_id' in workflow_task.data and
                        workflow_task.data['search_set_item_id']==prompt.id %} selected {% endif %}>{{ prompt.title }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="bottom-toolbar" style>
            <div>
                <!-- Action buttons -->

                <div style="padding: 0px; margin: 0 auto; display: flex; justify-content: center; gap: 15px;">
                    {% if is_editing %}
                    <button id="deletePromptToWorkflowTaskBtn" class="btn btn-secondary" style="flex-grow: 1;">Test
                        Step</button>
                    {% endif %}
                    <button id="confirmPromptStepBtn" class="btn btn-primary" style="flex-grow: 1;">
                        {% if is_editing %}
                        Update
                        {% else %}
                        Add Prompt
                        {% endif %}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Close this section
        $('#closeAddPromptToWorkflowBtn').on("click", function (e) {
            e.preventDefault();  // Prevent default behavior, if needed
            $('#workflowAddPromptModal').remove();
        });


        // When the dropdown changes, load its data‐prompt into the textarea
        $('#extractionSetDropdown').on('change', function () {
            const selectedOption = $(this).find('option:selected');
            const promptText = selectedOption.data('prompt') || '';
            $('#promptInput').val(promptText);
        });

        // If the user types/edits the textarea, reset the dropdown to the “no selection” option
        $('#promptInput').on('input', function () {
            const dropdown = $('#extractionSetDropdown');
            if (dropdown.val()) {
                dropdown.val('');
            }
        });
    </script>
</div>
