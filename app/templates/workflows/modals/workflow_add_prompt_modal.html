<div id="workflowAddPromptModal" class="workflow-overlay" style="display: block;">
    <div class="workflow-modal-content">
        <h2 class="workflow-modal-header">
            {% if is_editing %}
            Update Prompt
            {% else %}
            Add Prompt
            {% endif %}
            <a id="closeAddPromptToWorkflowBtn" style="float:right; color: #88888899; cursor: pointer;"><i
                    class="fa-solid fa-circle-xmark"></i></a>
        </h2>

        <!-- Description -->
        <hr>
        <h3 class="workflow-modal-subtitle">Uses AI to perform your instructions on text</h3>
        <hr style="padding-bottom: 0px; margin-bottom: 0px;">

        <div class="workflow-content-body">
            <!-- Tab content for dropdown selection -->
            <div>
                <label class="workflow-label" style="padding-top: 10px;">Enter a
                    prompt:</label>
                <textarea id="promptInput" class="input-field"
                    placeholder="e.g., Summarize this for me into a todo list" rows="10"
                    value="{{ workflow_task.data['prompt'] if is_editing else '' }}">{{ workflow_task.data['prompt'] if is_editing else '' }}</textarea>
                <label class="workflow-label" style="padding-top: 10px;">From your saved
                    tasks:</label>
                <select id="extractionSetDropdown" class="workflow-input-field">
                    <option value="">Select a saved task...</option>
                    {% for prompt in prompts %}
                    <option value="{{ prompt.id }}" data-prompt="{{ prompt.searchphrase|e }}" {% if is_editing
                        and 'search_set_item_id' in workflow_task.data and
                        workflow_task.data['search_set_item_id']==prompt.id %} selected {% endif %}>{{ prompt.title }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="loading-event-progress-container">
            <div id="loading-event-progress">
                <h2 id="loading-event-title"></h2>
                <div class="loading-progress-bar">
                    <div class="loading-progress-fill"></div>
                </div>
                <p id="loading-event-message"></p>
            </div>
        </div>

        <div class="bottom-toolbar" style>
            <div>
                <!-- Action buttons -->

                <div style="padding: 0px; margin: 0 auto; display: flex; justify-content: center; gap: 15px;">
                    {% if is_editing %}
                    <button id="testPromptButton" class="btn btn-secondary" style="flex-grow: 1;">Test
                        Step</button>
                    {% endif %}
                    <button id="confirmPromptStepBtn" class="btn btn-primary" style="flex-grow: 1;">
                        {% if is_editing %}
                        Update
                        {% else %}
                        Add Prompt
                        {% endif %}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Close this section
        $('#closeAddPromptToWorkflowBtn').on("click", function (e) {
            e.preventDefault();  // Prevent default behavior, if needed
            $('#workflowAddPromptModal').remove();
        });


        // When the dropdown changes, load its data‐prompt into the textarea
        $('#extractionSetDropdown').on('change', function () {
            const selectedOption = $(this).find('option:selected');
            const promptText = selectedOption.data('prompt') || '';
            $('#promptInput').val(promptText);
        });

        // If the user types/edits the textarea, reset the dropdown to the “no selection” option
        $('#promptInput').on('input', function () {
            const dropdown = $('#extractionSetDropdown');
            if (dropdown.val()) {
                dropdown.val('');
            }
        });

        $('#testPromptButton').off("click").on("click", function (e) {
            e.preventDefault();
            e.stopPropagation();   // ← prevent the parent “.edit‐workflow‐step‐task‐btn” from seeing this click

            console.log("clicked");
            let workflow_task_id = $(this).attr("data-task-id");

            task_data = {
                type: "prompt"

            }
            const dropdown = $('#extractionSetDropdown');
            if (dropdown.val()) {
                task_data["prompt"] = dropdown.val()
            } else {
                task_data["prompt"] = $('#promptInput').val()
            }

            console.log(workflow_task_id);  // Debugging line
            let data = JSON.stringify({
                task_name: "Prompt",
                document_uuids: document_uuids,
                task_data: task_data
            });

            console.log(data);

            $.ajax({
                url: `/workflows/workflow/step/test`,
                type: 'POST',
                data: data,
                contentType: 'application/json; charset=utf-8',
                dataType: 'json',
                async: true,
                success: function (data) {
                    console.log(data);
                },
                error: function (xhr, ajaxOptions, thrownError) {
                    console.log(xhr.status);
                    console.log(thrownError);
                }
            });
        });

        const steps = [
            {
                title: "Processing document",
                messages: ["Reading layout…", "Extracting text…", "Perfoming OCR…"],
                duration: 5000
            },
            {
                title: "Performing security check",
                messages: ["Analyzing document content…", "Searching for private information…", "Scanning for compliance…"],
                duration: 4000
            },
            {
                title: "Preparing document for AI",
                messages: ["Getting ready…", "Document passed check…"],
                duration: 2500
            },
            {
                title: "Done!",
                messages: ["All set ✅"],
                duration: 1500
            }
        ];

        const container = document.getElementById("loading-event-progress");
        const titleEl = document.getElementById("loading-event-title");
        const messageEl = document.getElementById("loading-event-message");
        const progressEl = document.querySelector(".loading-progress-fill");

        async function runSteps() {
            // fade container in once at start
            container.classList.add("fade-in");

            for (let { title, messages, duration } of steps) {
                titleEl.textContent = title;
                messageEl.textContent = "";
                progressEl.style.width = "0%";

                // cycle through messages during progress
                let msgIdx = 0;
                const msgInterval = setInterval(() => {
                    messageEl.textContent = messages[msgIdx % messages.length];
                    msgIdx++;
                }, duration / messages.length);

                // animate fill
                await new Promise(res => {
                    progressEl.style.transition = `width ${duration}ms linear`;
                    // trigger layout so transition takes effect
                    requestAnimationFrame(() => {
                        progressEl.style.width = "100%";
                    });
                    setTimeout(() => {
                        clearInterval(msgInterval);
                        res();
                    }, duration);
                });

                // fade out before next
                await new Promise(res => {
                    container.classList.remove("fade-in");
                    container.classList.add("fade-out");
                    setTimeout(() => {
                        container.classList.remove("fade-out");
                        container.classList.add("fade-in");
                        res();
                    }, 500);
                });
            }

            // optional: leave the last "Done!" visible a bit longer
            setTimeout(() => container.classList.add("fade-out"), 1000);
        }

        // kick it off
        runSteps();

    </script>
</div>
