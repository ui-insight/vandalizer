<script>
        var active_step = 1;
        var current_workflow_id = "{{ workflow_id }}";
        var current_space_id = "{{ current_space_id }}"
        var workflow_elapsed_time = 0;
        var workflow_session_id = "";

        var workflow_time= 0;
        var steps_completed = 0;
        var total_steps = 1;
        var workflow_interval_id = null;

        var socket = io();

        function capitalize(str) {
                return str.charAt(0).toUpperCase() + str.slice(1);
            }

        function workflowConfirmStepTask(stepType, workflow_step_id=0, workflow_task_id=0) {

            dict = {
                workflow_uuid: current_workflow_id,
                space_id: current_space_id,
                workflow_step_id: workflow_step_id,
                workflow_task_id: workflow_task_id
            }

            console.log("Confirm/Edit step");
            console.log(dict);

            if (stepType == "extraction") {
                let activeTab = $('.workflow-tab-btn.active').attr('id');
                if (activeTab == "manualInputTab") {
                    let manualInput = $('#extractionInput')[0].value;
                    dict['manual_input'] = manualInput;
                } else {
                    let dropdown_selection = $('#extractionSetDropdown')[0].value;
                    dict["search_set_id"] = dropdown_selection
                }
            } else if (stepType == "prompt") {
                let activeTab = $('.workflow-tab-btn.active').attr('id');
                if (activeTab == "manualInputTab") {
                    let manualInput = $('#promptInput')[0].value;
                    dict['manual_input'] = manualInput;
                } else {
                    let dropdown_selection = $('#extractionSetDropdown')[0].value;
                    dict["search_set_item_id"] = dropdown_selection
                }
            } else if (stepType == "formatter") {
                let activeTab = $('.workflow-tab-btn.active').attr('id');
                if (activeTab == "manualInputTab") {
                    let manualInput = $('#promptInput')[0].value;
                    dict['manual_input'] = manualInput;
                } else {
                    let dropdown_selection = $('#extractionSetDropdown')[0].value;
                    dict["search_set_item_id"] = dropdown_selection
                }
            }

            let data = JSON.stringify(dict);

            $.ajax({
                url: `/workflows/add_${stepType.toLowerCase()}_step`,
                type: 'POST',
                data: data,
                contentType: 'application/json; charset=utf-8',
                dataType: 'json',
                async: true,
                success: function (data) {
                    location.reload();
                },
                error: function (xhr, ajaxOptions, thrownError) {
                    console.log(xhr.status);
                    console.log(thrownError);
                }
            });
        }

        function workflowAddStepTaskType(stepType, workflow_step_id, is_editing=false) {
        let data = JSON.stringify({
            workflow_uuid: current_workflow_id,
            space_id: current_space_id,
            workflow_step_id: workflow_step_id,
            is_editing: is_editing
        });

        $.ajax({
            url: `/workflows/add_${stepType.toLowerCase()}_step`,
            type: 'GET',
            data: data,
            contentType: 'application/json; charset=utf-8',
            dataType: 'json',
            async: true,
            success: function (data) {
                $('#newWorkflowStepModal').fadeOut();
                $(data.template).hide().appendTo('.search-results-panel').fadeIn();

                console.log(stepType);
                $(`#confirm${capitalize(stepType)}StepBtn`).off("click").on("click", function (e) {
                    e.preventDefault();
                    console.log(`Add ${capitalize(stepType)}`);
                    workflowConfirmStepTask(stepType, workflow_step_id, 0);
                });
            },
            error: function (xhr, ajaxOptions, thrownError) {
                console.log(xhr.status);
                console.log(thrownError);
            }
        });
    }

    function workflowEditStepTaskType(workflow_step_id, workflow_task_id, stepType) {
        let data = JSON.stringify({
            workflow_uuid: current_workflow_id,
            space_id: current_space_id,
            workflow_task_id: workflow_task_id,
            workflow_step_id: workflow_step_id,
            is_editing: true
        });

        $.ajax({
            url: `/workflows/add_${stepType.toLowerCase()}_step`,
            type: 'GET',
            data: data,
            contentType: 'application/json; charset=utf-8',
            dataType: 'json',
            async: true,
            success: function (data) {
                $('#newWorkflowStepModal').fadeOut();
                $(data.template).hide().appendTo('.search-results-panel').fadeIn();

                console.log(stepType);
                $(`#confirm${capitalize(stepType)}StepBtn`).off("click").on("click", function (e) {
                    e.preventDefault();
                    console.log(`Add ${capitalize(stepType)}`);
                    workflowConfirmStepTask(stepType, workflow_step_id, workflow_task_id);
                });
            },
            error: function (xhr, ajaxOptions, thrownError) {
                console.log(xhr.status);
                console.log(thrownError);
            }
        });
    }


        $('#newWorkflowStepBtn').on("click", function () {
            workflowAddStep();
        });


        function addWorkflowStepListeners() {
            console.log("Adding step listeners");

            $('.edit-workflow-step-task-btn').off("click").on("click", function (e) {
                    e.preventDefault();  // Prevent default behavior, if needed
                    let task_id = $(this).attr("data-task-id");
                    let step_id = $(this).attr("data-step-id");
                    let task_type = $(this).attr("data-task-type");
                    console.log("Editing step task");
                    workflowEditStepTaskType(step_id, task_id, task_type);
                });
        }


        function workflowAddStep() {
            let data = JSON.stringify({
                workflow_id: current_workflow_id,
                space_id: current_space_id,
                title: $('#newWorkflowStepName')[0].value
            });

            $.ajax({
                url: `/workflows/add_workflow_step`,
                type: 'POST',
                data: data,
                contentType: 'application/json; charset=utf-8',
                dataType: 'json',
                async: true,
                success: function (data) {
                    $('#newWorkflowStepModal').fadeOut();
                    $(data.template).hide().appendTo('.search-results-panel').fadeIn();
                    addWorkflowStepListeners();
                },
                error: function (xhr, ajaxOptions, thrownError) {
                    console.log(xhr.status);
                    console.log(thrownError);
                }
            });
        }




        $(document).ready(function () {


            $('.workflow-item').on("click", function () {
                let uuid = $(this).attr("data-uuid");
                fetchWorkflow(uuid);
            });

            function addWorkflowListeners() {
                console.log("Add workflow listeners");
                updateDocumentSelections();

                $('#workflow-close-button').off("click").on("click", function () {
                    $('#search-results-panel').fadeOut();
                    const url = new URL(window.location.href);
                      url.searchParams.delete('workflow_id');
                      window.history.replaceState(null, '', url.toString());
                });

                $('#add-workflow-step-btn').off("click").on("click", function () {
                    $('#newWorkflowStepModal').show();
                });

                $('.edit-workflow-attachments-btn').off("click").on("click", function (e) {
                    e.preventDefault();  // Prevent default behavior, if needed
                    workflowAddAttachmentStep();
                });

                $('.edit-workflow-step-btn').off("click").on("click", function (e) {
                    e.preventDefault();  // Prevent default behavior, if needed
                    let step_id = $(this).attr("data-step-id");
                    let step_type = $(this).attr("data-step-type");
                    console.log("Editing step");
                    workflowEditStep(step_id);
                });

                $('.run-workflow').off("click").on("click", function (e) {
                    e.preventDefault();  // Prevent default behavior, if needed
                    //let workflow_id = $(this).attr("data-workflow-id");
                    runWorkflow();
                });

                $('.download-workflow').off("click").on("click", function (e) {
                    e.preventDefault();  // Prevent default behavior, if needed
                    //let workflow_id = $(this).attr("data-workflow-id");
                    if (workflow_session_id != "") {
                      downloadWorkflow(workflow_session_id);
                    } else {
                      runWorkflow(download=true);
                    }
                });

                $('.integrate-workflow').off("click").on("click", function (e) {
                    e.preventDefault();  // Prevent default behavior, if needed
                    integrateWorkflow();
                });
            }

            function fetchWorkflow(workflow_uuid) {
                showScanning();
                console.log("fetching workflow:" + workflow_uuid);
                current_workflow_id = workflow_uuid;

                let data = JSON.stringify({
                    workflow_uuid: workflow_uuid,
                });

                $.ajax({
                    url: '/workflows/fetch_workflow',
                    type: 'POST',
                    data: data,
                    contentType: 'application/json; charset=utf-8',
                    dataType: 'json',
                    async: true,
                    success: function (data) {


                        hideWorking();
                        stopScanning();
                        $('#search-results-panel').show();
                        $('#search-results-panel').empty();
                        $(data.template).hide().appendTo('#search-results-panel').fadeIn();
                        addWorkflowListeners();

                                    // Update the browser URL with the current_workflow_id without refreshing the page
                        const newUrl = `${window.location.origin}${window.location.pathname}?workflow_id=${current_workflow_id}&section=Workflows`;
                        history.pushState({ path: newUrl }, '', newUrl);
                    },
                    error: function (xhr, ajaxOptions, thrownError) {
                        console.log(xhr.status);
                        console.log(thrownError);
                    }
                });
            }

            function workflowEditStep(step_id) {
                console.log(current_space_id);

                let data = JSON.stringify({
                    workflow_id: current_workflow_id,
                    space_id: current_space_id,
                    editing: true,
                    workflow_step_id: step_id
                });

                $.ajax({
                    url: `/workflows/edit_step`,
                    type: 'POST',
                    data: data,
                    contentType: 'application/json; charset=utf-8',
                    dataType: 'json',
                    async: true,
                    success: function (data) {
                        $('#newWorkflowStepModal').fadeOut();
                        $(data.template).hide().appendTo('#search-results-panel').fadeIn();
                        addWorkflowStepListeners();
                    },
                    error: function (xhr, ajaxOptions, thrownError) {
                        console.log(xhr.status);
                        console.log(thrownError);
                    }
                });
            }

            // Helper function to capitalize the first letter of a string


            function workflowAddAttachmentStep() {
                console.log(current_space_id);
                let data = JSON.stringify({
                    workflow_uuid: current_workflow_id,
                    space_id: current_space_id,
                });

                $.ajax({
                    url: '/workflows/add_attachment',
                    type: 'GET',
                    data: data,
                    contentType: 'application/json; charset=utf-8',
                    dataType: 'json',
                    async: true,
                    success: function (data) {
                        $(data.template).hide().appendTo('.modal-container').fadeIn();
                        addWorkflowListeners();

                        $('.attachment-file-item').on("click", function (e) {
                            e.preventDefault();  // Prevent default behavior, if needed
                            let uuid =  $(this).attr("data-uuid");
                            workflowConfirmAttachmentStep(uuid);
                        });



                    },
                    error: function (xhr, ajaxOptions, thrownError) {
                        console.log(xhr.status);
                        console.log(thrownError);
                    }
                });
            }

            function workflowConfirmAttachmentStep(uuid) {
                console.log(current_space_id);
                let data = JSON.stringify({
                    workflow_uuid: current_workflow_id,
                    space_id: current_space_id,
                    document_uuid: uuid
                });

                $.ajax({
                    url: '/workflows/add_attachment',
                    type: 'POST',
                    data: data,
                    contentType: 'application/json; charset=utf-8',
                    dataType: 'json',
                    async: true,
                    success: function (data) {
                        location.reload();
                    },
                    error: function (xhr, ajaxOptions, thrownError) {
                        console.log(xhr.status);
                        console.log(thrownError);
                    }
                });
            }

            function generateSessionId() {
              const timestamp = Date.now().toString(36); // Convert timestamp to base-36 string
              const randomString = Math.random().toString(36).substring(2, 10); // Generate a random base-36 string
              return `${timestamp}-${randomString}`;
          }




            function runWorkflow(download=false) {
              if (document_uuids == "") {
                  showToast("Select a document to run workflow");
                  return;
              }

              let session_id = generateSessionId();
              workflow_session_id = session_id;

              // Start the timer before making the API call
              workflow_interval_id = startWorkflowTimer();

                console.log(current_space_id);
                let data = JSON.stringify({
                    workflow_id: current_workflow_id,
                    space_id: current_space_id,
                    document_uuids: document_uuids,
                    session_id: session_id,

                });

                $('.add-step').hide();
                $('.workflow-output').fadeIn();

                // let workflowIntervalId = pollWorkflowStatus(session_id);

                $.ajax({
                    url: '/workflows/workflow/run',
                    type: 'POST',
                    data: data,
                    contentType: 'application/json; charset=utf-8',
                    dataType: 'json',
                    async: true,
                    success: function (data) {


                      let chat_response = "";
                      if(data.output.hasOwnProperty('answer')) {
                          chat_response = data.output.answer;
                      }
                      else {
                          chat_response = data.output;
                      }

                      // check if response if json or string
                      if (typeof chat_response === 'object') {
                          chat_response = JSON.stringify(chat_response, null, 2);
                      }
                      // const outputText = JSON.stringify(chat_response).replace(/^"|"$/g, '');
                      // remove ```html at the beginning and ``` at the end of the response`
                      let outputText = chat_response
                          .replace(/^```(html|json|markdown)?\s*|\s*```$/g, '');

                      $('.workflow-output-section').append(`${outputText}<br>`);
                      $('.workflow-container').animate({ scrollTop: $('.workflow-container')[0].scrollHeight }, 'slow');
                      $('.workflow-step').removeClass('active');
                          // Add 'active' class to the nth $('.workflow-step') element (0-based index)
                      $('.workflow-output').addClass('active');
                      $('.workflow-output').find('.step-connector').addClass('active');
                      $('.workflow-loader').hide();
                      // performWorkflowStatus(session_id, workflow_elapsed_time);

                      if (download) {
                          downloadWorkflow(session_id)
                      }
                    },
                    error: function (xhr, ajaxOptions, thrownError) {
                        console.log(xhr.status);
                        console.log(thrownError);
                        if (workflow_interval_id) {
                            clearInterval(workflow_interval_id);
                        }
                    }
                });
            }

            // If there is a workflow in the browser href
            let workflow_template = {{ workflow_template|length }}
            if (workflow_template != "") {
                addWorkflowListeners();
            }

        });

        function integrateWorkflow() {
              let data = JSON.stringify({
                  workflow_id: current_workflow_id,
              });

              $.ajax({
                  url: '/workflows/integrate',
                  type: 'POST',
                  data: data,
                  contentType: 'application/json; charset=utf-8',
                  dataType: 'json',
                  async: true,
                  success: function (data) {
                  $(data.template).hide().appendTo('.search-results-panel').fadeIn();
                      addWorkflowListeners();


                  },
                  error: function (xhr, ajaxOptions, thrownError) {
                      console.log(xhr.status);
                      console.log(thrownError);
                  }
              });
          }

        function startWorkflowTimer() {
            // Clear any existing interval
            if (workflow_interval_id) {
                clearInterval(workflow_interval_id);
            }

            // Reset elapsed time
            workflow_elapsed_time = 0;

            // Start new timer
            workflow_interval_id = setInterval(() => {
                workflow_elapsed_time += 1;
                updateWorkflowStatus();
            }, 1000);

            return workflow_interval_id;
        }

        function updateWorkflowStatus() {
            // Update the UI with current elapsed time
            $('.workflow-output-attachment-info').html(`
                <span>${steps_completed} / ${total_steps} steps completed</span>
                <span><i>${workflow_elapsed_time} seconds elapsed</i></span>
            `);
        }


        socket.on('workflow_status', function(data) {
          //const { steps_completed, total_steps, status } = data;
          steps_completed = data.steps_completed;
          total_steps = data.total_steps;
          let workflow_status = data.status;
          workflow_time = workflow_elapsed_time;

          console.log("Workflow status received:", data);
          console.log("elapsed time", workflow_time);

          if (steps_completed == active_step) {
              $('.workflow-step').removeClass('active');
              $('.step-connector').removeClass('active');

              $('.workflow-loader').hide();
              // Add 'active' class to the nth $('.workflow-step') element (0-based index)
              $('.workflow-step').eq(active_step).addClass('active');
              $('.workflow-step').eq(active_step).find('.step-connector').addClass('active');
              $('.workflow-loader').eq(active_step - 1).fadeIn();
              active_step = steps_completed + 1;
          }

          // Update steps completed and time elapsed
          $('.workflow-output-attachment-info').html(`
              <span>${steps_completed} / ${total_steps} steps completed</span>
              <span><i> ${workflow_time} seconds elapsed</i></span>
          `);

          // Check if the workflow is completed or has failed
          if (workflow_status === 'completed' || workflow_status === 'failed') {
              if (workflow_interval_id) {
                  clearInterval(workflow_interval_id);
              }
              workflow_elapsed_time = 0;

              if (status === 'failed') {
                  showToast("Workflow failed");
              } else {
                  showToast("Workflow completed");
              }
          }
        });


        function performWorkflowStatus(session_id, workflow_time) {
    $.ajax({
            url: `/workflows/workflow/status?session_id=${session_id}`,
            type: 'GET',
            dataType: 'json',
            success: function (data) {
                console.log(data);
                //const { steps_completed, total_steps, status } = data;
                let steps_completed = data.steps_completed;
                let total_steps = data.total_steps;
  
                console.log(steps_completed);
  
  
                if (steps_completed == active_step) {
                    $('.workflow-step').removeClass('active');
                    $('.step-connector').removeClass('active');
  
                    $('.workflow-loader').hide();
                    // Add 'active' class to the nth $('.workflow-step') element (0-based index)
                    $('.workflow-step').eq(active_step).addClass('active');
                    $('.workflow-step').eq(active_step).find('.step-connector').addClass('active');
                    $('.workflow-loader').eq(active_step-1).fadeIn();
                    active_step = steps_completed + 1;
                }
  
                // Update steps completed and time elapsed
                $('.workflow-output-attachment-info').html(`
                    <span>${steps_completed} / ${total_steps} steps completed</span>
                    <span><i> ${workflow_time} seconds elapsed</i></span>
                `);
  
                // Check if the workflow is completed or has failed
                if (status === 'completed' || status === 'failed') {
                    clearInterval(intervalId); // Stop polling
                    if (status === 'failed') {
                        showToast("Workflow failed");
                    } else {
                        showToast("Workflow completed");
                    }
                }
            },
            error: function (xhr, ajaxOptions, thrownError) {
                clearInterval(intervalId); // Stop polling on error
                console.log(xhr.status);
                console.log(thrownError);
                showToast("Error polling workflow status");
            }
        });
  }

        function downloadWorkflow(session_id) {
          window.location.href = `/workflows/download?session_id=${session_id}`;
        }

        function pollWorkflowStatus(session_id) {
          let startTime = Date.now(); // Capture start time to calculate elapsed time
          const pollInterval = 1000; // Poll every second
          const maxAttempts = 180; // Optional: Stop polling after 60 seconds to prevent infinite loop
          workflow_elapsed_time = 0;

          let intervalId = setInterval(() => {
              workflow_elapsed_time += 1;

              performWorkflowStatus(session_id, workflow_elapsed_time);

              // Stop polling after max attempts
              if (workflow_elapsed_time >= maxAttempts) {
                  clearInterval(intervalId);
                  showToast("Workflow status polling timed out");
              }
          }, pollInterval);

          return intervalId;
      }
</script>
