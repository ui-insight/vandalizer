<script>
var sections = [];

function beginCompliance() {
    $('#right-panel-content').empty();
    $('.document')[0].classList.add('scanning');
    showLLMLoading();
    $.ajax({
        url: '/api/sections',
        type: 'POST',
        data: JSON.stringify({
            uuid: "{{ document.uuid }}"
        }),
        contentType: 'application/json; charset=utf-8',
        dataType: 'json',
        async: true,
        success: function(msg) {
            let answer = msg;
            console.log(answer);
            sections = answer;
            removeLLMLoading();
            getCompliance();
            
        },
        error: function(xhr, ajaxOptions, thrownError) {
            console.log(xhr.status);
            console.log(thrownError);
        }
    });
}

function getCompliance() {
    if(sections.length == 0) {
        $('#document-title')[0].innerHTML = "{{  document.title }}"
        $('.document')[0].classList.remove('scanning')
        return;
    }

    section = sections[0];
    $('#document-title')[0].innerHTML = "Scanning: " + section

    $.ajax({
        url: '/api/compliance',
        type: 'POST',
        data: JSON.stringify({
            uuid: "{{ document.uuid }}",
            section: section
        }),
        contentType: 'application/json; charset=utf-8',
        dataType: 'json',
        async: true,
        success: function(msg) {
            let post = msg;
            const newBox = $(`
                <div class="answer-card" style="padding: 30px; ">
                    <p style="font-size: 30; color: #5D6F81;">
                        Section: ${post[0]} <i></i>
                    </p>
                    <p style="font-size: 30; color: #5D6F81;">
                        ${post[1]}
                    </p>
                </div>
            `).hide();
            $('#right-panel-content').append(newBox);
            newBox.fadeIn();
            
            sections.shift();
            getCompliance()
        },
        error: function(xhr, ajaxOptions, thrownError) {
            console.log(xhr.status);
            console.log(thrownError);
        }
    });
}
</script>
