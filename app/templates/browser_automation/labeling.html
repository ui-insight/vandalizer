{% extends "base.html" %}

{% block title %}Label Recording - Vandalizer{% endblock %}

{% block styles %}
{{ super() }}
<style>
    .labeling-container {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 20px;
        height: calc(100vh - 80px);
        /* Adjust based on navbar */
        padding: 20px 0;
    }

    .sidebar {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #dee2e6;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .main-content {
        background: white;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #dee2e6;
        overflow-y: auto;
    }

    .step-list {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .step-card {
        border: 1px solid #e9ecef;
        border-radius: 6px;
        padding: 15px;
        background: #fff;
        transition: box-shadow 0.2s;
    }

    .step-card:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .step-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid #f1f3f5;
    }

    .step-badge {
        background: #e9ecef;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.85em;
        font-weight: 600;
        text-transform: uppercase;
    }

    .step-type-click {
        background: #e3f2fd;
        color: #0d47a1;
    }

    .step-type-fill_form {
        background: #e8f5e9;
        color: #1b5e20;
    }

    .step-type-navigate {
        background: #f3e5f5;
        color: #4a148c;
    }

    .step-body {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .form-group label {
        font-size: 0.9em;
        color: #6c757d;
        font-weight: 500;
    }

    .form-control {
        padding: 8px;
        border: 1px solid #ced4da;
        border-radius: 4px;
    }

    .screenshot-thumb {
        max-width: 100px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
</style>
{% endblock %}

{% block main_content %}
<div class="labeling-container" id="labeling-app" data-recording-id="{{ recording_id }}">
    <div class="sidebar">
        <h3>Workflow Details</h3>
        <div class="form-group">
            <label>Workflow Name</label>
            <input type="text" id="workflow-name" class="form-control" placeholder="e.g. Login and Download Report">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="workflow-desc" class="form-control" rows="3"
                placeholder="What does this workflow do?"></textarea>
        </div>
        <hr>
        <button class="btn btn-primary btn-block" id="save-workflow-btn">Save Workflow</button>
        <button class="btn btn-secondary btn-block" onclick="window.close()">Cancel</button>
    </div>

    <div class="main-content">
        <h3>Recorded Steps (<span id="step-count">0</span>)</h3>
        <div id="steps-container" class="step-list">
            <!-- Steps will be injected here via JS -->
            <div class="text-center p-5 text-muted">Loading steps...</div>
        </div>
    </div>
</div>
{% endblock %}

{% blockscripts %}
{{ super() }}
<script src="{{ url_for('static', filename='javascript/labeling.js') }}"></script>
{% endblock %}
