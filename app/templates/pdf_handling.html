<script>
    $('#semantic-panel').hide();
    var highlightTerms = [];
    var searchTerm = "";
    var current_search_item = 0;
    needsScroll = true;
    pdfjsLib.GlobalWorkerOptions.workerSrc = '/static/javascript/pdf/pdf.worker.js';
    window.document_displayed = false;

    {% if (documents != None) and documents | length > 0 %}
    var documentPath = '/static/uploads/{{ selected_document.path }}';
    {% else %}
    var documentPath = null;
    {% endif %}


    var pdfDoc = null;

    var pageNum = 1,
        pageRendering = false,
        pdfContainer = document.getElementById('document');

    function renderPage(num) {
        pageRendering = true;
        pdfDoc.getPage(num).then(function (page) {
            // 1) figure out the scale to fit container width
            const cssWidth = pdfContainer.clientWidth; // available width
            const unscaled = page.getViewport({ scale: 1 });
            // Keep a small horizontal padding if desired (set to 0 if not)
            const horizontalPadding = 0;
            const targetWidth = Math.max(0, cssWidth - horizontalPadding * 2);
            const scale = targetWidth / unscaled.width;

            // 2) build the centered page wrapper
            const wrapper = document.createElement('div');
            wrapper.className = 'pdf-page';
            wrapper.style.width = Math.floor(unscaled.width * scale) + 'px'; // centers via #document flex
            wrapper.style.position = 'relative';

            // 3) canvas + overlay sized to the viewport
            const canvas = document.createElement('canvas');
            canvas.className = 'pdf-canvas';
            const overlay = document.createElement('div');
            overlay.className = 'overlay-layer';

            wrapper.appendChild(canvas);
            wrapper.appendChild(overlay);
            pdfContainer.appendChild(wrapper);

            // 4) crisp rendering on HiDPI
            const dpr = window.devicePixelRatio || 1;
            const viewport = page.getViewport({ scale: scale });
            canvas.width = Math.floor(viewport.width * dpr);
            canvas.height = Math.floor(viewport.height * dpr);
            canvas.style.width = Math.floor(viewport.width) + 'px';
            canvas.style.height = Math.floor(viewport.height) + 'px';

            overlay.style.width = canvas.style.width;
            overlay.style.height = canvas.style.height;

            const ctx = canvas.getContext('2d');
            const renderContext = {
                canvasContext: ctx,
                viewport: viewport,
                transform: [dpr, 0, 0, dpr, 0, 0] // scale up internally for crispness
            };

            const renderTask = page.render(renderContext);
            renderTask.promise.then(function () {
                pageRendering = false;
                // pass overlay instead of the wrapper/canvas for highlight placement
                highlightText(page, highlightTerms, viewport, overlay);
            });
        });
    }

    function renderPDF() {
        pdfContainer.innerHTML = '';
        current_search_item = 0;
        needsScroll = false;
        if (!pdfDoc) return;

        for (let pageNumber = 1; pageNumber <= pdfDoc.numPages; pageNumber++) {
            renderPage(pageNumber);
        }
    }

    // rerender on resize so pages reflow & gaps don’t appear on some screens
    let resizeTimer;
    window.addEventListener('resize', function () {
        if (!window.document_displayed) return;
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
            renderPDF();
        }, 150);
    });

    // Fix: highlightTerms empty check, and place highlights inside the overlay
    function highlightText(page, highlightTerms, viewport, overlayEl) {
        if (!highlightTerms || highlightTerms.length === 0) return;

        page.getTextContent().then(function (textContent) {
            textContent.items.forEach(function (textItem) {
                const textString = textItem.str;
                const phrase = highlightTerms.find(p => textString && textString.includes(p));
                if (phrase === undefined) return;

                // coords
                const scale = viewport.scale;
                const [, , , , tx, ty] = textItem.transform; // a,b,c,d,tx,ty
                const x = tx * scale;
                const y = viewport.height - (ty * scale) - (textItem.height * scale);

                const highlight = document.createElement('div');
                highlight.className = 'highlight';
                Object.assign(highlight.style, {
                    position: 'absolute',
                    left: x + 'px',
                    top: y + 'px',
                    width: (textItem.width * scale) + 'px',
                    height: (textItem.height * scale) + 'px',
                    backgroundColor: 'yellow',
                    opacity: 0.5
                });
                overlayEl.appendChild(highlight);
            });

            const highlights = $('.highlight');
            if (highlights.length === 0) {
                $('#semantic-panel').hide();
            } else {
                $('#semantic-panel').show();
                $('#semantic-panel-term').text(searchTerm);
                $('#semantic-panel-count').text((current_search_item + 1) + " of " + highlights.length);

                if (needsScroll) {
                    needsScroll = false;
                    const $scrollHost = $('.left-panel');
                    const $target = $(highlights[current_search_item]);
                    const delta = $target.offset().top - $scrollHost.offset().top + $scrollHost.scrollTop() - 40;
                    $scrollHost.animate({ scrollTop: delta }, 600);
                }
            }
        });
    }


    function documentExists(url, callback) {
        $.ajax({
            url: url,
            type: 'HEAD',
            success: function () {
                callback(true);
            },
            error: function () {
                callback(false);
            }
        });
    }

    {% if documents | length > 0 %}

    console.log("rendering document")
    console.log("{{ documents[0].path }}");
    // check if the document is a pdf
    console.log("document path: " + documentPath);
    const extension = documentPath.split('.').pop();
    console.log("extension: " + extension);



    {% endif %}

    function renderDocument() {
        console.log("document path: " + documentPath);
        const extension = documentPath.split('.').pop();
        console.log("extension: " + extension);

        if (extension == "pdf") {
            // check if the pdfPath is valid path on the server
            console.log("pdf file exists");

            console.log("pdf path: " + documentPath);
            pdfjsLib.getDocument(documentPath).promise.then(function (pdfDoc_) {
                pdfDoc = pdfDoc_;

                renderPDF();
                window.document_displayed = true;
            });
        } else if (extension == "html") {
            var iframe = document.createElement('iframe');
            iframe.src = documentPath;
            iframe.width = "100%";
            iframe.height = "100%";
            pdfContainer.appendChild(iframe);
            window.document_displayed = true;
        }
    }

    function renderHTML() {
        pdfContainer.innerHTML = '';
        var iframe = document.createElement('iframe');
        iframe.src = documentPath;
        iframe.width = "100%";
        iframe.height = "100%";
        pdfContainer.appendChild(iframe);
    }

    function renderPDF() {
        pdfContainer.innerHTML = '';
        current_search_item = 0;
        needsScroll = false;

        if (pdfDoc == null) {
            return;
        }

        for (let pageNumber = 1; pageNumber <= pdfDoc.numPages; pageNumber++) {
            renderPage(pageNumber);
        }
    }

</script>
