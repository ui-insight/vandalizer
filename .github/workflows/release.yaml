name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make backend-install frontend-install

      - name: Run release validation
        run: make release-check

  publish-images:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image_name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - image_name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository }}-${{ matrix.image_name }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Scan release image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}-${{ matrix.image_name }}:${{ github.ref_name }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  github-release:
    needs: publish-images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Release validation ran with `make release-check`.

            Container images published for this tag:
            - `ghcr.io/${{ github.repository }}-backend:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository }}-frontend:${{ github.ref_name }}`
