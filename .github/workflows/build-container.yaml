name: Publish Continuous Images
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch: # Optional: Allow manual triggering

jobs:
  build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image_name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - image_name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Set outputs
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            raw_ref='${{ github.event.workflow_run.head_branch }}'
            sha_short="$(printf '%s' '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)"
          else
            raw_ref="${GITHUB_REF_NAME}"
            sha_short="$(git rev-parse --short HEAD)"
          fi
          sanitized_ref="$(printf '%s' "${raw_ref}" | tr '/:@ ' '-' | tr -cd '[:alnum:]._-' | sed 's/^-*//; s/-*$//')"
          echo "ref_name=${sanitized_ref}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${sha_short}" >> "$GITHUB_OUTPUT"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: |
            VERSION=sha-${{ steps.vars.outputs.sha_short }}
          tags: ghcr.io/${{ github.repository }}-${{ matrix.image_name }}:sha-${{ steps.vars.outputs.sha_short }},ghcr.io/${{ github.repository }}-${{ matrix.image_name }}:${{ steps.vars.outputs.ref_name }}
          file: ${{ matrix.dockerfile }}
