name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-static:
    name: Backend Release Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        run: make backend-install

      - name: Run backend release checks
        run: make backend-static

  backend-backlog:
    name: Backend Advisory Backlog
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        run: make backend-install

      - name: Run backend backlog checks (typecheck + dependency audit)
        run: make backend-backlog

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        run: make backend-install

      - name: Run unit tests + Tier 1
        run: make backend-ci

      - name: Run Tier 2 (MongoDB)
        run: make backend-test-integration-t2

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: make frontend-install

      - name: Dependency audit (npm audit, fail on critical)
        run: make frontend-audit

      - name: Run frontend CI checks
        run: make frontend-ci

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-static, backend-test, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build release containers
        run: make docker-build
